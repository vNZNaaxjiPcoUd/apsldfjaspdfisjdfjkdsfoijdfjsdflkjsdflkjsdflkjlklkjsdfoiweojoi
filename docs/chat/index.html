<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>聊天 🌿</title>
    <link rel="manifest" href="manifest.json">
    <!-- 引入圓潤可愛的字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* 使用 100dvh 配合 JS 動態調整，解決手機瀏覽器高度與虛擬鍵盤閃動問題 */
        :root { 
            --app-height: 100dvh; 
            --primary-green: #73c89a;
            --primary-dark: #5bb382;
            --bg-color: #eaf6ef;
            --chat-bg: #ffffff;
            --msg-self-bg: #dcf5e7;
            --msg-other-bg: #f4f8f5;
            --text-main: #2d3e34;
            --text-light: #7b9685;
        }
        
        * { 
            box-sizing: border-box; 
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
        }
        
        body { 
            margin: 0; 
            padding: 0; 
            height: var(--app-height); 
            background-color: var(--bg-color); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
        }
        
        /* 容器加上圓角與柔和陰影 */
        #setup-screen, #chat-screen { 
            width: 100%; 
            max-width: 600px; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            background: var(--chat-bg); 
            box-shadow: 0 10px 30px rgba(91, 179, 130, 0.15); 
        }
        
        /* 讓桌面版看起來像個獨立的 App 視窗 */
        @media (min-width: 601px) {
            #setup-screen, #chat-screen {
                height: 90%;
                border-radius: 24px;
                overflow: hidden;
            }
        }

        #chat-screen { display: none; }
        
        /* 標題列設計：漸層綠色與圓潤底邊 */
        .header { 
            background: linear-gradient(135deg, #81d4a8, #5bb382); 
            color: white; 
            padding: 20px 15px; 
            text-align: center; 
            flex: 0 0 auto; 
            font-weight: 700;
            font-size: 1.1em;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            box-shadow: 0 4px 10px rgba(91, 179, 130, 0.2);
            z-index: 10;
        }

        #room-title {
            font-size: 1.4em;
            letter-spacing: 1px;
        }
        
        /* 訊息區 */
        #messages { 
            flex: 1 1 auto; 
            overflow-y: auto; 
            padding: 20px 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            background-color: #fafdfb;
        }
        
        /* 訊息泡泡與彈出動畫 */
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8) translateY(10px); }
            80% { transform: scale(1.05) translateY(-2px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .msg { 
            padding: 12px 16px; 
            max-width: 75%; 
            line-height: 1.5; 
            word-wrap: break-word; 
            animation: popIn 0.35s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
            color: var(--text-main);
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }
        
        .msg.self { 
            align-self: flex-end; 
            background: var(--msg-self-bg); 
            border-radius: 20px 20px 4px 20px; 
        }
        .msg.other { 
            align-self: flex-start; 
            background: var(--chat-bg); 
            border: 1px solid #eef5f0;
            border-radius: 20px 20px 20px 4px; 
        }
        
        .msg-name { 
            font-size: 0.8em; 
            color: var(--text-light); 
            margin-bottom: 5px; 
            font-weight: 600;
        }
        
        /* 輸入區：留白更舒適，適應 iOS */
        #input-area { 
            flex: 0 0 auto; 
            display: flex; 
            padding: 15px; 
            background: var(--chat-bg); 
            padding-bottom: calc(15px + env(safe-area-inset-bottom)); 
            box-shadow: 0 -4px 15px rgba(0,0,0,0.02);
            z-index: 10;
        }
        
        /* 圓潤的輸入框 */
        input[type="text"] { 
            flex: 1; 
            padding: 12px 20px; 
            border: 2px solid #e0ebe4; 
            border-radius: 25px; 
            font-size: 16px; 
            outline: none;
            background: #f9fcf9;
            transition: border-color 0.3s;
            color: var(--text-main);
        }
        
        input[type="text"]:focus {
            border-color: var(--primary-green);
            background: #ffffff;
        }
        
        input::placeholder { color: #a4bdaf; }

        /* 互動按鈕 */
        button { 
            padding: 12px 24px; 
            margin-left: 10px; 
            border: none; 
            background: var(--primary-green); 
            color: white; 
            border-radius: 25px; 
            cursor: pointer; 
            font-size: 16px;
            font-weight: 700;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(115, 200, 154, 0.3);
        }
        
        button:hover { 
            background: var(--primary-dark); 
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(91, 179, 130, 0.4);
        }
        
        button:active { 
            transform: translateY(1px); 
            box-shadow: 0 2px 5px rgba(91, 179, 130, 0.3);
        }
        
        /* ======== 設定畫面（登入畫面）兩欄式微調 ======== */
        #setup-screen { 
            justify-content: center; 
            padding: 30px; 
            text-align: center;
        }

        #setup-screen h2 {
            color: var(--primary-dark);
            margin-bottom: 5px;
            font-size: 2em;
        }

        /* 兩欄排版的容器 */
        .input-row {
            display: flex;
            gap: 15px;
            width: 100%;
            margin: 20px 0;
        }

        /* 單個欄位容器 */
        .input-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        /* 欄位小標題 */
        .input-col label {
            color: var(--primary-dark);
            font-size: 0.9em;
            font-weight: 700;
            margin-bottom: 8px;
            margin-left: 5px;
        }

        #setup-screen .input-row input {
            width: 100%;
            padding: 14px 20px;
        }

        #setup-screen button {
            margin-left: 0;
            padding: 15px;
            font-size: 18px;
            width: 100%; /* 讓按鈕填滿寬度，與兩欄寬度齊平 */
            max-width: 300px;
            margin: 0 auto;
        }

        /* 窄螢幕時自動變為上下排列 */
        @media (max-width: 400px) {
            .input-row {
                flex-direction: column;
                gap: 15px;
            }
        }
        /* ================================================== */

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- 登入設定畫面 -->
    <div id="setup-screen">
        <h2>🌱 歡迎來到聊天室</h2>
        <p style="color: var(--text-light); margin-top: 0; margin-bottom: 10px; font-size: 0.9em;">準備好開始互動了嗎？</p>
        
        <!-- 兩欄式輸入區塊 -->
        <div class="input-row">
            <div class="input-col">
                <label for="setup-room">房間名稱</label>
                <input type="text" id="setup-room" placeholder="例如: roomA" autocomplete="off">
            </div>
            <div class="input-col">
                <label for="setup-name">可愛暱稱</label>
                <input type="text" id="setup-name" placeholder="例如: ฅ^•ﻌ•^ฅ" autocomplete="off">
            </div>
        </div>

        <button onclick="joinChat()">開始聊天 🚀</button>
    </div>

    <!-- 聊天主畫面 -->
    <div id="chat-screen">
        <div class="header">
            <div id="room-title">Room</div>
            <div style="font-size: 13px; font-weight: 600; margin-top: 8px; opacity: 0.9;">
                🟢 在線人數: <span id="online-count">1</span> 人
            </div>
        </div>
        
        <div id="messages">
            <!-- 訊息範例 (會由 js 動態生成) -->
        </div>
        
        <div id="input-area">
            <input type="text" id="msg-input" placeholder="輸入你想說的話..." autocomplete="off">
            <button onclick="sendMsg()" id="send-btn">發送 ✨</button>
        </div>
    </div>

    <!-- 保留原本的邏輯腳本 -->
    <script src="cs.js"></script>
</body>
</html>
