<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>可愛聊天室 🌿</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary-green: #73c89a;
            --primary-dark: #5bb382;
            --bg-color: #eaf6ef;
            --chat-bg: #ffffff;
            --msg-self-bg: #f0fdf6;
            --msg-other-bg: #ffffff;
            --text-main: #2d3e34;
            --text-light: #7b9685;
        }
        
        * { 
            box-sizing: border-box; 
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
        }
        
        body { 
            margin: 0; 
            padding: 0; 
            /* 鎖死邊界，防止手機鍵盤將整個網頁往上推 */
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--bg-color); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
        }
        
        #setup-screen, #chat-screen { 
            width: 100%; 
            max-width: 600px; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            background: var(--chat-bg); 
        }
        
        @media (min-width: 601px) {
            #setup-screen, #chat-screen {
                height: 90%;
                border-radius: 16px;
                box-shadow: 0 10px 30px rgba(91, 179, 130, 0.15); 
                overflow: hidden;
            }
        }

        #chat-screen { display: none; }
        
        /* ======== 1. 頂部標題極簡化 ======== */
        .header { 
            background: linear-gradient(135deg, #81d4a8, #5bb382); 
            color: white; 
            padding: 8px 15px; /* 大幅縮小上下留白 */
            display: flex; 
            justify-content: space-between; /* 左右平分 */
            align-items: center;
            flex: 0 0 auto; 
            font-weight: 700;
            font-size: 0.9em; /* 縮小字體 */
            z-index: 10;
        }

        #room-title {
            font-size: 1.1em;
            letter-spacing: 0.5px;
        }

        .online-status {
            font-size: 0.85em;
            font-weight: 600;
            opacity: 0.95;
        }
        
        /* ======== 2. 訊息區與單行泡泡 ======== */
        #messages { 
            flex: 1 1 auto; 
            overflow-y: auto; 
            padding: 10px 15px; /* 減少內距 */
            display: flex; 
            flex-direction: column; 
            gap: 6px; /* 訊息之間更緊湊 */
            background-color: #fafdfb;
        }

        .msg { 
            padding: 6px 10px; /* 扁平化內距 */
            width: 100%; /* 佔滿寬度 */
            max-width: 100%; 
            line-height: 1.4; 
            word-wrap: break-word; 
            color: var(--text-main);
            border-radius: 6px;
            
            /* 將名字與內容變成同一行 */
            display: flex;
            flex-direction: row;
            align-items: baseline;
            gap: 5px;
        }
        
        /* 捨棄左右排版，全部靠左，僅用極淡的底色區分 */
        .msg.self { 
            background: var(--msg-self-bg); 
            border-left: 3px solid var(--primary-green);
        }
        .msg.other { 
            background: var(--msg-other-bg); 
            border-bottom: 1px solid #f0f5f2; /* 輕微的分隔線 */
        }
        
        .msg-name { 
            font-size: 0.9em; 
            color: var(--primary-dark); 
            font-weight: 700;
            white-space: nowrap; /* 名字不換行 */
            margin: 0;
        }
        
        /* 自動在名字後面加上冒號 */
        .msg-name::after {
            content: "：";
        }
        
        /* ======== 3. 輸入區扁平化 ======== */
        #input-area { 
            flex: 0 0 auto; 
            display: flex; 
            padding: 8px 10px; /* 極簡留白 */
            gap: 8px; /* 元素間距縮小 */
            background: var(--chat-bg); 
            padding-bottom: calc(8px + env(safe-area-inset-bottom)); 
            border-top: 1px solid #e0ebe4;
            z-index: 10;
        }
        
        input[type="text"] { 
            flex: 1; 
            padding: 8px 15px; /* 扁平化輸入框 */
            border: 1px solid #e0ebe4; 
            border-radius: 20px; 
            font-size: 16px; /* 維持 16px 避免 iOS 放大 */
            outline: none;
            background: #f9fcf9;
            transition: border-color 0.2s;
            color: var(--text-main);
        }
        
        input[type="text"]:focus {
            border-color: var(--primary-green);
            background: #ffffff;
        }
        
        input::placeholder { color: #a4bdaf; }

        button { 
            padding: 8px 16px; /* 扁平化按鈕 */
            margin: 0; 
            border: none; 
            background: var(--primary-green); 
            color: white; 
            border-radius: 20px; 
            cursor: pointer; 
            font-size: 15px;
            font-weight: 700;
        }
        
        button:active { 
            background: var(--primary-dark);
        }
        
        /* ======== 設定畫面 ======== */
        #setup-screen { justify-content: center; padding: 20px; text-align: center; }
        #setup-screen h2 { color: var(--primary-dark); margin-bottom: 5px; font-size: 1.8em; }
        .input-row { display: flex; gap: 10px; width: 100%; margin: 15px 0; }
        .input-col { flex: 1; display: flex; flex-direction: column; text-align: left; }
        .input-col label { color: var(--primary-dark); font-size: 0.85em; font-weight: 700; margin-bottom: 5px; margin-left: 5px; }
        #setup-screen .input-row input { width: 100%; padding: 10px 15px; }
        #setup-screen button { padding: 12px; font-size: 16px; width: 100%; max-width: 300px; margin: 0 auto; }
        @media (max-width: 400px) { .input-row { flex-direction: column; gap: 10px; } }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- 登入設定畫面 -->
    <div id="setup-screen">
        <h2>🌱 歡迎聊天室</h2>
        <p style="color: var(--text-light); margin: 0 0 10px 0; font-size: 0.9em;">請輸入資訊</p>
        
        <div class="input-row">
            <div class="input-col">
                <!--label for="setup-room">房間名稱</label-->
                <input type="text" id="setup-room" placeholder="房間名稱" autocomplete="off">
            </div>
            <div class="input-col">
                <!--label for="setup-name">可愛暱稱</label-->
                <input type="text" id="setup-name" placeholder="暱稱 例如: ฅ^•ﻌ•^ฅ" autocomplete="off">
            </div>
        </div>
        <button onclick="joinChat()">開始聊天 🚀</button>
    </div>

    <!-- 聊天主畫面 -->
    <div id="chat-screen">
        <!-- 頂部扁平化，單行顯示 -->
        <div class="header">
            <span id="room-title">Room</span>
            <span class="online-status">🟢 在線: <span id="online-count">1</span></span>
        </div>
        
        <div id="messages"></div>
        
        <!-- 輸入區扁平化 -->
        <div id="input-area">
            <input type="text" id="msg-input" placeholder="輸入訊息..." autocomplete="off">
            <button onclick="sendMsg()" id="send-btn">發送</button>
        </div>
    </div>

    <!-- 原有邏輯腳本 -->
    <script src="cs.js"></script>

    <!-- ======== 4. 解決 iOS 鍵盤擋畫面與留白的終極腳本 ======== -->
    <script>
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', () => {
                // 強制容器高度等於鍵盤彈出後的真實可視高度
                document.body.style.height = window.visualViewport.height + 'px';
                
                // 自動捲動到最新訊息
                const messages = document.getElementById('messages');
                if (messages) {
                    messages.scrollTop = messages.scrollHeight;
                }
            });
        }

        // 解決鍵盤收起後，畫面不歸位的 Bug
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('blur', () => {
                setTimeout(() => {
                    window.scrollTo(0, 0);
                }, 100);
            });
        });
    </script>
</body>
</html>
