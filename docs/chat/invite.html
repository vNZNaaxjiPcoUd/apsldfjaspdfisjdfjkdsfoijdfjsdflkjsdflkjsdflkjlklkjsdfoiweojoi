<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>邀請</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { 
            margin: 0; padding: 20px; 
            background-color: #f4f4f9; 
            display: flex; align-items: center; justify-content: center; 
            min-height: 100dvh; 
        }
        .container { 
            width: 100%; max-width: 400px; 
            background: #fff; padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        h2 { text-align: center; color: #333; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; font-size: 14px; }
        
        input[type="email"], input[type="text"], input[type="password"], textarea { 
            width: 100%; padding: 12px; 
            border: 1px solid #ccc; border-radius: 8px; 
            font-size: 16px; 
        }
        textarea { resize: vertical; min-height: 100px; }
        
        button { 
            width: 100%; padding: 12px; 
            border: none; background: #28a745; color: white; 
            border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold;
            transition: background 0.3s;
        }
        button:active { background: #218838; }
        button:disabled { background: #6c757d; cursor: not-allowed; }
        
        #status { text-align: center; margin-top: 15px; font-size: 14px; font-weight: bold; }
        .success { color: #28a745; }
        .error { color: #dc3545; }
        
        /* 增加返回聊天室的連結樣式 */
        .back-link { display: block; text-align: center; margin-top: 20px; font-size: 14px; color: #007bff; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="container">
        <h2>發送邀請</h2>
        
        <div class="form-group">
            <label for="invite-email">對方的 Email 網址</label>
            <input type="email" id="invite-email" placeholder="example@email.com" required>
        </div>
        
        <div class="form-group">
            <label for="invite-room">指定房間名稱</label>
            <input type="text" id="invite-room" placeholder="例如: ProjectX" oninput="updateMessagePreview()">
        </div>
        
        <div class="form-group">
            <label for="invite-message">邀請內容 (自動產生)</label>
            <textarea id="invite-message"></textarea>
        </div>

        <div class="form-group">
            <label for="invite-pwd">發送密碼</label>
            <input type="password" id="invite-pwd" placeholder="請輸入密碼解密 API" required>
        </div>

        <button id="send-btn" onclick="sendInvite()">驗證並送出邀請</button>
        <div id="status"></div>
        
    </div>

    <script>
        // ★ 請將這裡替換成您剛才透過 Console 算出來的加密字串 ★
        const GAS_URL_AES = "U2FsdGVkX1+rOJ737501762SHPTjLbr4eL5NQk/2zYgA5U3rGzjz2KbrNx4n+mFnO9gMEk6upebQCTaiexs9pV5ANE5EucZ32WoxS/lhQobhx8W5a4VYNM9futEd6tmaGIUNzz7ANWUfSwvBk+Pm/NVMssVaf5TK59+U+LFgDwvdU1jyk/Q0LgqAwF/ICU+i"; 

        function getBaseChatUrl() {
            let currentUrl = window.location.href;
            if (currentUrl.includes('invite.html')) {
                return currentUrl.split('invite.html')[0] + 'chat.html';
            }
            return currentUrl.replace(/\/$/, '') + '/'; 
        }

        function updateMessagePreview() {
            const roomName = document.getElementById('invite-room').value.trim();
            const baseUrl = getBaseChatUrl();
            const messageBox = document.getElementById('invite-message');
            
            if (roomName) {
                messageBox.value = `嗨！邀請您加入專屬聊天室。\n\n請點擊以下連結直接進入房間：\n${baseUrl}?${roomName}\n\n期待與您連線！`;
            } else {
                messageBox.value = `嗨！邀請您加入專屬聊天室。\n\n請點擊以下連結：\n${baseUrl}\n\n期待與您連線！`;
            }
        }

        async function sendInvite() {
            const emailInput = document.getElementById('invite-email');
            const messageInput = document.getElementById('invite-message');
            const pwdInput = document.getElementById('invite-pwd'); // 取得密碼
            const btn = document.getElementById('send-btn');
            const statusDiv = document.getElementById('status');
            
            const emailaddr = emailInput.value.trim();
            const message = messageInput.value.trim();
            const pwd = pwdInput.value;
            
            // --- 基礎防呆檢查 ---
            if (!emailaddr || !emailaddr.includes('@')) {
                showStatus('請輸入有效的 Email', false); return;
            }
            if (!message) {
                showStatus('訊息內容不能為空', false); return;
            }
            if (!pwd) {
                showStatus('請輸入管理員密碼', false); return;
            }

            // --- ★ 執行 AES 解密邏輯 ---
            let decryptedUrl = "";
            try {
                // 使用 CryptoJS 進行 AES 解密，並轉回 UTF8 明文字串
                const bytes = CryptoJS.AES.decrypt(GAS_URL_AES, pwd);
                decryptedUrl = bytes.toString(CryptoJS.enc.Utf8);
            } catch (error) {
                // 解密過程中發生嚴重錯誤 (通常是因為密碼不對導致解析失敗)
                console.error("解密出錯:", error);
            }

            // 檢查解密出來的字串是否為正確的 GAS 網址格式
            if (!decryptedUrl.startsWith("https://script.google.com/")) {
                showStatus('密碼錯誤：無法驗證您的發送權限！', false);
                return; // 終止發送
            }

            // UI 狀態：發送中
            btn.disabled = true;
            btn.innerText = "驗證成功，發送中...";
            showStatus('', true);

            // --- 執行 API 呼叫 (使用解密後的 decryptedUrl) ---
            try {
                const res = await fetch(decryptedUrl, {
                    method: 'POST',
                    body: JSON.stringify({ 
                        action: 'notify', 
                        emailaddr: emailaddr, 
                        message: message 
                    })
                });
                const data = await res.json();
                
                if (data.success) {
                    showStatus('邀請已成功發送！', true);
                    emailInput.value = ''; // 成功後清空信箱欄位
                    pwdInput.value = '';   // 清空密碼欄位以策安全
                } else {
                    showStatus('發送失敗: ' + (data.error || '未知錯誤'), false);
                }
            } catch (error) {
                showStatus('網路錯誤，請稍後再試。', false);
                console.error("Notify error:", error);
            } finally {
                btn.disabled = false;
                btn.innerText = "驗證並送出邀請";
            }
        }

        function showStatus(text, isSuccess) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = text;
            statusDiv.className = isSuccess ? 'success' : 'error';
        }

        window.onload = updateMessagePreview;
    </script>
</body>
</html>
