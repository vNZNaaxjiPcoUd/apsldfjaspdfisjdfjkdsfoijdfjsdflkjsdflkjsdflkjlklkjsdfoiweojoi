<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>新書</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 16px;
            color: #fff;
        }

        /* --- 主視窗卡片美化 --- */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            background-color: #2a2a2a;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        a {
            color: #aaa;
            text-decoration: none;
            transition: color 0.2s;
        }
        
        a:hover {
            color: #4CAF50;
        }
        
        /* --- 輸入框美化 --- */
        .url-input {
            padding: 14px 18px;
            font-size: 16px;
            width: 300px;
            border: 1.5px solid #444;
            border-radius: 10px;
            background-color: #333;
            color: #fff;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        
        .url-input:focus {
            border-color: #4CAF50;
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.2);
        }
        
        .url-input::placeholder {
            color: #777;
        }
        
        /* --- 按鈕美化 --- */
        .launch-btn {
            padding: 14px 30px;
            font-size: 18px;
            font-weight: bold;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            width: 100%;
            box-sizing: border-box;
        }
        
        .launch-btn:hover {
            background-color: #45a049;
        }

        .launch-btn:active {
            transform: scale(0.98);
        }

        /* --- 底部連結區塊美化 --- */
        .links-group {
            display: flex;
            gap: 15px;
            align-items: center;
            font-size: 14px;
            margin-top: 5px;
        }

        .divider {
            color: #555;
        }
        
        /* --- 狀態訊息泡泡 (Toast) 樣式 --- */
        .status-info {
            position: fixed;
            bottom: 40px; /* 懸浮於底部 */
            left: 50%;
            transform: translateX(-50%) translateY(50px);
            padding: 12px 24px;
            text-align: center;
            font-size: 15px;
            font-weight: 500;
            border-radius: 30px; /* 泡泡圓角 */
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); /* 帶有彈性的動畫 */
        }

        /* 顯示泡泡的狀態 */
        .status-info.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            visibility: visible;
        }

        /* 不同情境的泡泡顏色 */
        .status-info.success {
            background-color: #e8f5e9;
            color: #2e7d32;
        }

        .status-info.error {
            background-color: #ffebee;
            color: #c62828;
        }

        .status-info.info {
            background-color: #e3f2fd;
            color: #1565c0;
        }
    </style>
</head>
<body>

    <div class="container">
        <input type="password" id="passwordInput" class="url-input" value="" placeholder="請輸入密碼">
        <input type="text" id="urlInput" class="url-input" value="" placeholder="書名" onkeydown="if(event.key === 'Enter') openLiveView()">
        
        <button class="launch-btn" onclick="openLiveView()">打開</button>
        
        <div class="links-group">
            <a id="nowReadLink" href="list.html" target="_blank"></a> 
            <a id="nowEditLink" href="list.html" target="_blank"></a> 
            <span class="divider">|</span> 
            <a href="newNoteList.html" target="_blank">舊</a>
        </div>
    </div>

    <div id="statusMessage" class="status-info"></div>

    <script src="newNote.js">
    </script>
</body>
</html>
