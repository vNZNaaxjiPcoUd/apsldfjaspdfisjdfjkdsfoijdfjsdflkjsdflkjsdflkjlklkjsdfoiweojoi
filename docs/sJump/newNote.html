<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>新書</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #222;
            gap: 15px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        
        .url-input {
            padding: 12px 15px;
            font-size: 16px;
            width: 320px;
            border: 1px solid #555;
            border-radius: 8px;
            background-color: #333;
            color: #fff;
            outline: none;
            transition: border-color 0.2s;
        }
        
        .url-input:focus {
            border-color: #4CAF50;
        }
        
        .url-input::placeholder {
            color: #aaa;
        }
        
        .launch-btn {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
            width: 320px;
        }
        
        .launch-btn:hover {
            background-color: #45a049;
        }
        
        /* --- 狀態訊息樣式 --- */
        .status-info {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 3px 10px;
            text-align: center;
            font-size: 12px;
            font-weight: bold;
            background-color: #b9d68bfa;
            border-top: 1px solid #ccc;
            z-index: 1000;
            box-sizing: border-box;
        }

    </style>
</head>
<body>

    <input type="password" id="passwordInput" class="url-input" value="" placeholder="">

    <input type="text" id="urlInput" class="url-input" value="" placeholder="書名"  onkeydown="if(event.key === 'Enter') openLiveView()">
    
    <button class="launch-btn" onclick="openLiveView()">打開</button>
    <div><a href="newNoteList.html">List</a></div>

    <div id="statusMessage" class="status-info" ></div>

    <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbx-zZPCI9kLiW7JbQ6gz10ey1b4f1d1EQlAVSd6zdC2DrAszbELQReOC93nND2WnF7S/exec';

    async function sLink(password, path, url, note)
    {
        try {
        const response = await fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ 
            password: password, 
            path: path, 
            url: url,
            note: note 
          })
        });
        
        const result = await response.json();
        if (result.status === 'success') {
          return true;
        } else {
          return false;
        }
      } catch (error) {
        return false;
      }
    }
    </script>

    <script>
        function updateStatus(message, type = 'info') {
            document.getElementById('statusMessage').textContent = message; 
        }


        async function openLiveView() {
            const inputElement = document.getElementById('urlInput');
            const bookName = inputElement.value.trim(); 
            const pwd = document.getElementById('passwordInput').value.trim();
            
            if (!bookName) {
                alert('請先填入書名！');
                return; 
            }
            
            const windowName = bookName.replace(/[^a-zA-Z0-9]/g, '_');
            //const windowFeatures = 'width=375,height=800,left=100,top=100,toolbar=no,menubar=no,scrollbars=no,resizable=yes,location=no,status=no';
            const windowFeatures = 'toolbar=no,menubar=yes,scrollbars=yes,resizable=yes';


            targetUrl = `https://n.jwint.net/r?${bookName}`;
            if(await sLink(pwd, "QN_"+bookName, targetUrl, "quickN:"+bookName)){
                console.log("url saved");
            }else{
                console.log("url save failed");
                updateStatus("鑰匙錯了！", "error");
                return;
            }   
            targetUrl = `https://n.jwint.net/?${bookName}=YfbMlmGq0j5WrCekCbqpn7tocCbNEbid0HCVjQB1xLBSkU3GqjKBtq8a7sQh2Zt`;
            window.open(targetUrl, windowName, windowFeatures);

            updateStatus("已開啟！", "success");
            inputElement.value = '';
        }
    </script>
</body>
</html>
