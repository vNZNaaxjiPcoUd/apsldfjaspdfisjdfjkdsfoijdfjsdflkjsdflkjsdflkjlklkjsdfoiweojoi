<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>短網址</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
      background-color: #f0f2f5;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    h2 { margin-top: 0; color: #1c1e21; text-align: center; }
    input {
      padding: 12px;
      font-size: 16px;
      border: 1px solid #ddd;
      border-radius: 6px;
      outline: none;
    }
    input:focus { border-color: #007bff; }
    button {
      padding: 12px;
      font-size: 16px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover { background-color: #0056b3; }
    #status { text-align: center; font-size: 14px; min-height: 20px; }
  </style>
</head>
<body>

  <div class="container">
    <h2>建立跳轉網址</h2>
    <input type="password" id="passwordInput" placeholder="請輸入管理密碼">
    <hr style="width:100%; border:0; border-top:1px solid #eee;">
    <input type="text" id="pathInput" placeholder="名稱 (例如: A)">
    <input type="url" id="urlInput" placeholder="目標 URL (https://...)">
    <input type="text" id="noteTxt" placeholder="註記">
    <button onclick="saveUrl()">儲存資料</button>
    <div id="status"></div>
  </div>

  <script src="addsurl.js">
  </script>
</body>
</html>
