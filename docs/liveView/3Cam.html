<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="1200">
    <title>LIVEVIEW</title>
    <!-- 引入 HLS.js 播放器套件 -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        /* 移除瀏覽器預設邊距，並讓網頁呈現滿版黑底 */
        * {
            box-sizing: border-box;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden; /* 防止出現滾動條 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

/* 單欄三列佈局 */
.grid-container {
    display: grid;
    /* 🔥 關鍵一：將 1fr 改為 minmax(0, 1fr)，強迫 Grid 欄位允許縮到 0 */
    grid-template-columns: minmax(0, 1fr); 
    grid-template-rows: repeat(3, 1fr);
    width: 100dvw;
    height: 100dvh;
    gap: 2px;
}

/* 每個單獨的攝影機視窗 */
.video-box {
    position: relative; /* 必須為 relative，作為影片絕對定位的基準 */
    background: #111;
    width: 100%;
    height: 100%;
    overflow: hidden;
    min-width: 0;
    min-height: 0;
}

/* 讓影片完全填滿格子 */
video {
    /* 🔥 關鍵二：使用絕對定位，徹底無視影片原生解析度的限制 */
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    
    object-fit: fill; 
    display: block; /* 建議改回 block，絕對定位下 flex 沒有意義 */
}
    </style>
</head>
<body>

    <div class="grid-container">
        <!-- 1. CamFront -->
        <div class="video-box">
            <video id="cam-front"  autoplay muted playsinline></video>
        </div>

        <!-- 2. CamDoor -->
        <div class="video-box">
            <video id="cam-door"  autoplay muted playsinline></video>
        </div>

        <!-- 3. CamGarage -->
        <div class="video-box">
            <video id="cam-garage"  autoplay muted playsinline></video>
        </div>
    </div>

    <script>
        // 定義 3 台攝影機的 HLS 串流網址
        const cameras = [
            { id: 'cam-front', src: 'http://localhost:8888/CamFront/index.m3u8' },
            { id: 'cam-door', src: 'http://localhost:8888/CamDoor/index.m3u8' },
            { id: 'cam-garage', src: 'http://localhost:8888/CamGarage/index.m3u8' }
        ];

        // 初始化並播放每一台攝影機
        function initPlayer(cam) {
            const videoElement = document.getElementById(cam.id);
            
            if (Hls.isSupported()) {
                const hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true,          // 開啟低延遲模式
                    backBufferLength: 0,           // 不保留過去的快取快照
                    maxBufferLength: 1,            // 最大只快取 1 秒的影片
                    maxMaxBufferLength: 2,
                    manifestLoadingMaxRetry: 10,
                    liveSyncDurationCount: 1.5,    // 強迫播放器緊跟在直播源後面 1.5 個切片的距離
                    liveMaxLatencyDurationCount: 3
                });
                hls.loadSource(cam.src);
                hls.attachMedia(videoElement);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    videoElement.play().catch(e => console.log("自動播放被瀏覽器阻擋:", e));
                });
            } 
            // 針對原生支援 HLS 的瀏覽器
            else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                videoElement.src = cam.src;
                videoElement.addEventListener('loadedmetadata', function() {
                    videoElement.play();
                });
            }
        }

        // 當網頁載入完成，開始依序播放
        window.addEventListener('DOMContentLoaded', () => {
            cameras.forEach(initPlayer);
        });
    </script>
</body>
</html>
