<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiveView</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #121212;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }
        /* 2x2 網格佈局 */
        .container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            width: 100vw;
            height: 100vh;
            gap: 4px; /* 監視器之間的黑邊縫隙 */
            padding: 4px;
        }
        /* 每個攝影機的外框 */
        .cam-box {
            position: relative;
            background-color: #000;
            border: 1px solid #2d2d2d;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* 影片元素 */
        video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* 保持原影片比例，不拉伸 */
        }
        /* 攝影機標籤 */
        .cam-title {
            position: absolute;
            top: 2px;
            left: 2px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 5px;
            z-index: 10;
            pointer-events: none; /* 防止擋住點擊事件 */
            letter-spacing: 1px;
        }
        /* 連線狀態提示 */
        .status {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: #ffb74d;
            font-size: 5px;
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 6px;
            border-radius: 3px;
            z-index: 10;
        }
        /* 右下角全螢幕按鈕 */
        .fullscreen-btn {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 1px;
            cursor: pointer;
            z-index: 10;
            font-size: 5px;
            transition: background 0.2s;
        }
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 1. 前左 -->
        <div class="cam-box" id="box-FLH">
            <div class="cam-title">前左</div>
            <div class="status" id="status-FLH">連線中...</div>
            <video id="video-FLH" autoplay controls playsinline muted></video>
            <button class="fullscreen-btn" onclick="toggleFullscreen('video-FLH')">全螢幕</button>
        </div>

        <!-- 2. 正前 -->
        <div class="cam-box" id="box-FrontH">
            <div class="cam-title">正前</div>
            <div class="status" id="status-FrontH">連線中...</div>
            <video id="video-FrontH" autoplay controls playsinline muted></video>
            <button class="fullscreen-btn" onclick="toggleFullscreen('video-FrontH')">全螢幕</button>
        </div>

        <!-- 3. 門前 -->
        <div class="cam-box" id="box-DoorH">
            <div class="cam-title">門前</div>
            <div class="status" id="status-DoorH">連線中...</div>
            <video id="video-DoorH" autoplay controls playsinline muted></video>
            <button class="fullscreen-btn" onclick="toggleFullscreen('video-DoorH')">全螢幕</button>
        </div>

        <!-- 4. 車庫 -->
        <div class="cam-box" id="box-GarageH">
            <div class="cam-title">車庫</div>
            <div class="status" id="status-GarageH">連線中...</div>
            <video id="video-GarageH" autoplay controls playsinline muted></video>
            <button class="fullscreen-btn" onclick="toggleFullscreen('video-GarageH')">全螢幕</button>
        </div>
    </div>

    <script>
        // 設定 4 支攝影機的 WHEP API 連線資訊
        const camosConfig = [
            { id: 'FLH', url: 'http://localhost:8889/CamFLH/whep' },
            { id: 'FrontH', url: 'http://localhost:8889/CamFrontH/whep' },
            { id: 'DoorH', url: 'http://localhost:8889/CamDoorH/whep' },
            { id: 'GarageH', url: 'http://localhost:8889/CamGarageH/whep' }
        ];

        // 初始化單一 WebRTC 連線的函式
        async function connectCam(cam) {
            const videoEl = document.getElementById(`video-${cam.id}`);
            const statusEl = document.getElementById(`status-${cam.id}`);

            try {
                // 1. 建立連線
                const pc = new RTCPeerConnection({
                    iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
                });

                // 2. 監聽視訊軌道
                pc.ontrack = (event) => {
                    if (videoEl.srcObject !== event.streams[0]) {
                        videoEl.srcObject = event.streams[0];
                        statusEl.style.color = '#66bb6a'; // 綠色代表成功
                        statusEl.innerText = "● 實時";
                    }
                };

                // 3. 要求接收影音
                pc.addTransceiver('video', { direction: 'recvonly' });
                pc.addTransceiver('audio', { direction: 'recvonly' });

                // 4. SDP Offer 握手
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);

                const response = await fetch(cam.url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/sdp' },
                    body: offer.sdp
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const answerSdp = await response.text();
                await pc.setRemoteDescription(new RTCSessionDescription({
                    type: 'answer',
                    sdp: answerSdp
                }));

            } catch (error) {
                console.error(`攝影機 [${cam.id}] 連線失敗:`, error);
                statusEl.style.color = '#ef5350'; // 紅色代表失敗
                statusEl.innerText = "斷線或不支援";
            }
        }

        // 獨立控制單一視訊全螢幕的功能
        function toggleFullscreen(videoId) {
            const video = document.getElementById(videoId);
            if (!document.fullscreenElement) {
                if (video.requestFullscreen) {
                    video.requestFullscreen();
                } else if (video.webkitRequestFullscreen) { /* Safari */
                    video.webkitRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        // 網頁載入時，併發啟動 4 支 Cam 的 WebRTC 連線
        window.onload = () => {
            camosConfig.forEach(cam => connectCam(cam));
        };
    </script>
</body>
</html>
