<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>試算表</title>
<style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; }
    table { border-collapse: collapse; margin-top: 10px; user-select: none; table-layout: fixed; }
    th, td { border: 1px solid #ccc; padding: 0; vertical-align: top; }
    th { background-color: #f8f9fa; padding: 5px; min-width: 70px; text-align: center; color: #333; height: 28px; position: relative; }
    td { position: relative; }
    
    textarea {
        border: 2px solid transparent; 
        outline: none;
        padding: 8px;
        font-size: 16px;
        box-sizing: border-box;
        background-color: transparent; 
        resize: none;
        font-family: inherit;
        line-height: 1.5;
        margin: 0;
        display: block;
    }
    textarea:focus { 
        background-color: #fff; 
        border: 2px solid #1a73e8; 
        z-index: 10;
        position: relative;
    }

    .resizer {
        position: absolute;
        top: 0;
        right: 0;
        width: 5px;
        height: 100%;
        cursor: col-resize;
        user-select: none;
        z-index: 1;
    }
    .resizer:hover, .resizer.resizing {
        background-color: #1a73e8;
    }

    .mode-clip textarea {
        width: 100%; height: 38px;
        white-space: nowrap; overflow: hidden; text-overflow: clip;
    }
    .mode-wrap textarea {
        width: 100%; min-height: 38px;
        white-space: normal; word-break: break-all; overflow: hidden;
        field-sizing: content; 
    }
    .mode-extend textarea {
        height: 38px;
        white-space: nowrap; overflow: hidden;
        field-sizing: content; 
    }

    .selecting { border: 2px dashed #ff9800 !important; background-color: #fff3e0 !important; z-index: 5; position: relative;}
    .selected-range { background-color: #e8f0fe !important; } 

    .controls { margin-bottom: 15px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;}
    button, select { padding: 6px 12px; cursor: pointer; background-color: #f0f0f0; border: 1px solid #ccc; border-radius: 4px; font-size: 16px;}
    button:hover { background-color: #e0e0e0; }

    #toast {
        visibility: hidden; min-width: 250px; background-color: #323232; color: #fff;
        text-align: center; border-radius: 8px; padding: 12px 16px; position: fixed;
        z-index: 1000; left: 50%; bottom: 30px; transform: translateX(-50%);
        font-size: 16px; box-shadow: 0px 4px 12px rgba(0,0,0,0.15);
        opacity: 0; transition: opacity 0.3s ease, bottom 0.3s ease;
    }
    #toast.show { visibility: visible; opacity: 1; bottom: 50px; }
    #toast.error { background-color: #d32f2f; }
</style>
</head>
<body>

    <div class="controls">
        <h2>試算表</h2>
        <button onclick="addRow()">增加十列</button>
        <button onclick="saveData()">💾 儲存</button>
        <button onclick="loadData()">📂 讀取</button>
        <select onchange="document.getElementById('spreadsheet').className = this.value">
            <option value="mode-clip">超出蓋住</option>
            <option value="mode-wrap">強制換行</option>
            <option value="mode-extend">隨文字延伸</option>
        </select>
    </div>

    <table id="spreadsheet" class="mode-clip"></table>

    <div id="toast"></div>

    <script>
        let COLS = 26; //A-Z 
        let ROWS = 29; 

        const table = document.getElementById('spreadsheet');
        const data = {}; 

        let toastTimeout;
        function showToast(message, isError = false) {
            const toast = document.getElementById("toast");
            toast.textContent = message;
            if (isError) toast.classList.add("error");
            else toast.classList.remove("error");
            
            toast.classList.add("show");
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => toast.classList.remove("show"), 3000);
        }

        const DB_NAME = 'SpreadsheetDB';
        const STORE_NAME = 'sheets';
        let dbInstance = null;

        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                    }
                };
                request.onsuccess = (e) => {
                    dbInstance = e.target.result;
                    resolve(dbInstance);
                };
                request.onerror = (e) => reject(e.target.error);
            });
        }

        async function saveData() {
            try {
                if (!dbInstance) await openDB();
                const tx = dbInstance.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                store.put({ id: 'sheet_1', cells: data });
                tx.oncomplete = () => showToast('💾 資料已成功儲存！');
                tx.onerror = () => showToast('儲存失敗！', true);
            } catch (error) {
                showToast('儲存發生錯誤，請查看控制台。', true);
            }
        }

        async function old_1_loadData() {
            try {
                if (!dbInstance) await openDB();
                const tx = dbInstance.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const request = store.get('sheet_1');
                request.onsuccess = () => {
                    const result = request.result;
                    if (result && result.cells) {
                        Object.keys(data).forEach(key => delete data[key]);
                        Object.assign(data, result.cells);
                        computeAll();
                        showToast('📂 資料讀取成功！');
                    } else {
                        showToast('本機沒有找到已儲存的資料。', true);
                    }
                };
                request.onerror = () => showToast('讀取失敗！', true);
            } catch (error) {
                showToast('讀取發生錯誤。', true);
            }
        }

        async function loadData() {
            try {
                if (!dbInstance) await openDB();
                const tx = dbInstance.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const request = store.get('sheet_1');
                
                request.onsuccess = () => {
                    const result = request.result;
                    if (result && result.cells) {
                        
                        // 1. 設定表格的「最小底線」
                        // 假設欄位最少維持 A~Z (26欄，index 0~25)，列數最少維持 1 列
                        let maxCol = 25; 
                        let maxRow = 10;

                        // 2. 找出存檔資料中，"真正有文字"的最大欄位與列數
                        Object.keys(result.cells).forEach(key => {
                            const cellValue = result.cells[key];
                            // 只有當格子裡面真的有資料（不是純空白）才計算進範圍
                            if (cellValue && cellValue.toString().trim() !== '') {
                                const pos = parseCellId(key);
                                if (pos) {
                                    if (pos.col > maxCol) maxCol = pos.col;
                                    if (pos.row > maxRow) maxRow = pos.row;
                                }
                            }
                        });

                        // 3. 直接更新全域變數為實際所需的精準大小
                        COLS = maxCol + 1;
                        ROWS = maxRow + 1;

                        // 4. 將資料載入記憶體
                        Object.keys(data).forEach(key => delete data[key]);
                        Object.assign(data, result.cells);

                        // 5. 強制清空並重新建立表格 DOM（不論放大或縮小都重建）
                        let headerRow = '<tr id="header-row"><th style="width: 40px;"></th>'; 
                        for (let c = 0; c < COLS; c++) {
                            headerRow += `<th style="width: 80px;">${String.fromCharCode(65 + c)}<div class="resizer"></div></th>`;
                        }
                        headerRow += '</tr>';
                        table.innerHTML = headerRow;

                        // 根據新的 ROWS 精準建立列數，不會再有額外的空白列
                        for (let r = 1; r <= ROWS; r++) {
                            createRowDOM(r);
                        }

                        // 6. 將資料實際填入 DOM 並計算公式
                        computeAll();
                        showToast(`📂 資料讀取成功！(表格已調整為 ${ROWS} 列)`);
                    } else {
                        showToast('本機沒有找到已儲存的資料。', true);
                    }
                };
                request.onerror = () => showToast('讀取失敗！', true);
            } catch (error) {
                showToast('讀取發生錯誤。', true);
            }
        }  
        
        
        let clipboardRangeData = null; 
        let selectMode = { active: false, baseVal: '', targetCol: -1, targetRow: -1, sourceInput: null };
        let isDragging = false;
        let selectionStart = null;
        let selectionEnd = null;

        let resizingCol = null;
        let startX = 0;
        let startWidth = 0;

        function initTable() {
            let headerRow = '<tr id="header-row"><th style="width: 40px;"></th>'; 
            for (let c = 0; c < COLS; c++) {
                headerRow += `<th style="width: 80px;">${String.fromCharCode(65 + c)}<div class="resizer"></div></th>`;
            }
            headerRow += '</tr>';
            table.innerHTML = headerRow;

            for (let r = 1; r <= ROWS; r++) {
                createRowDOM(r);
            }
            computeAll();
            openDB(); 
        }

        function createRowDOM(r) {
            let tr = document.createElement('tr');
            tr.innerHTML = `<th>${r}</th>`;
            for (let c = 0; c < COLS; c++) {
                const id = getCellId(c, r);
                data[id] = data[id] || ''; 
                tr.innerHTML += `<td><textarea id="${id}" rows="1" 
                    onfocus="handleFocus(this)" 
                    onblur="handleBlur(this)" 
                    oninput="handleInput(this)"
                    onkeydown="handleKeyDown(event, this)"></textarea></td>`;
            }
            table.appendChild(tr);
        }

        function addRow() {
            const startRow = ROWS + 1; // 記錄要從哪一行開始新增
            ROWS += 10;                // 更新總列數
            
            // 利用 for 迴圈，把新增的 10 列依序建立出來
            for (let r = startRow; r <= ROWS; r++) {
                createRowDOM(r);
            }
        }

        function getCellId(colIndex, rowIndex) {
            return String.fromCharCode(65 + colIndex) + rowIndex;
        }

        function parseCellId(id) {
            const match = id.match(/^([A-Za-z]+)(\d+)$/);
            if (!match) return null;
            return { col: match[1].toUpperCase().charCodeAt(0) - 65, row: parseInt(match[2]) };
        }

        function handleFocus(cell) {
            cell.value = data[cell.id] || '';
            selectMode.active = false;
            selectMode.sourceInput = cell;
            clearSelectHighlight();
        }

        function handleBlur(cell) {
            if (selectMode.active && document.activeElement === selectMode.sourceInput) return;
            data[cell.id] = cell.value;
            selectMode.active = false;
            clearSelectHighlight();
            computeAll();
        }

        function handleInput(cell) {
            const val = cell.value;
            const lastChar = val.slice(-1);
            if (['=', '+', '-', '*', '/', '('].includes(lastChar)) {
                selectMode.active = true;
                selectMode.baseVal = val;
                selectMode.sourceInput = cell;
                const pos = parseCellId(cell.id);
                selectMode.targetCol = pos.col;
                selectMode.targetRow = pos.row;
            } else {
                selectMode.active = false;
                clearSelectHighlight();
            }
        }

        table.addEventListener('mousedown', (e) => {
            if (e.target.classList.contains('resizer')) {
                resizingCol = e.target.parentElement;
                startX = e.pageX;
                startWidth = resizingCol.offsetWidth;
                e.target.classList.add('resizing');
                e.preventDefault(); 
                return;
            }

            if (selectMode.active && selectMode.sourceInput && e.target.tagName === 'TEXTAREA' && e.target !== selectMode.sourceInput) {
                e.preventDefault(); 
                const targetId = e.target.id;
                selectMode.sourceInput.value = selectMode.baseVal + targetId;
                clearSelectHighlight();
                e.target.classList.add('selecting');
                selectMode.active = false; 
                selectMode.sourceInput.focus();
                const len = selectMode.sourceInput.value.length;
                selectMode.sourceInput.setSelectionRange(len, len);
                return;
            }

            if (e.target.tagName === 'TEXTAREA') {
                const pos = parseCellId(e.target.id);
                if (pos) {
                    if (e.shiftKey && selectionStart) {
                        e.preventDefault(); 
                        selectionEnd = pos;
                        drawSelection();
                    } else {
                        isDragging = true;
                        selectionStart = pos;
                        selectionEnd = pos;
                        drawSelection();
                    }
                }
            }
        });

        table.addEventListener('mouseover', (e) => {
            if (isDragging && e.target.tagName === 'TEXTAREA') {
                const pos = parseCellId(e.target.id);
                if (pos) {
                    selectionEnd = pos;
                    drawSelection();
                }
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (resizingCol) {
                const newWidth = startWidth + (e.pageX - startX);
                if (newWidth > 30) {
                    resizingCol.style.width = newWidth + 'px';
                    resizingCol.style.minWidth = newWidth + 'px';
                }
            }
        });

        document.addEventListener('mouseup', () => {
            if (resizingCol) {
                resizingCol.querySelector('.resizer').classList.remove('resizing');
                resizingCol = null;
            }
            isDragging = false;
        });

        function drawSelection() {
            document.querySelectorAll('.selected-range').forEach(el => el.classList.remove('selected-range'));
            if (!selectionStart || !selectionEnd) return;

            const minC = Math.min(selectionStart.col, selectionEnd.col);
            const maxC = Math.max(selectionStart.col, selectionEnd.col);
            const minR = Math.min(selectionStart.row, selectionEnd.row);
            const maxR = Math.max(selectionStart.row, selectionEnd.row);

            for (let r = minR; r <= maxR; r++) {
                for (let c = minC; c <= maxC; c++) {
                    const id = getCellId(c, r);
                    const el = document.getElementById(id);
                    if (el) el.classList.add('selected-range');
                }
            }
        }

        function clearSelectHighlight() {
            document.querySelectorAll('.selecting').forEach(el => el.classList.remove('selecting'));
        }

        function focusCell(col, row) {
            if (col < 0 || col >= COLS || row < 1 || row > ROWS) return;
            const target = document.getElementById(getCellId(col, row));
            if (target) {
                target.focus();
                const pos = parseCellId(target.id);
                selectionStart = pos;
                selectionEnd = pos;
                drawSelection();
            }
        }

        function handleKeyDown(e, cell) {
            const pos = parseCellId(cell.id);
            if (!pos) return;

            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                cell.blur(); 
                focusCell(pos.col, pos.row + 1); 
                return;
            }

            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                if (selectMode.active) {
                    e.preventDefault(); 
                    clearSelectHighlight();
                    
                    if (e.key === 'ArrowUp') selectMode.targetRow = Math.max(1, selectMode.targetRow - 1);
                    if (e.key === 'ArrowDown') selectMode.targetRow = Math.min(ROWS, selectMode.targetRow + 1);
                    if (e.key === 'ArrowLeft') selectMode.targetCol = Math.max(0, selectMode.targetCol - 1);
                    if (e.key === 'ArrowRight') selectMode.targetCol = Math.min(COLS - 1, selectMode.targetCol + 1);

                    const targetId = getCellId(selectMode.targetCol, selectMode.targetRow);
                    const targetInput = document.getElementById(targetId);
                    if (targetInput) targetInput.classList.add('selecting');

                    cell.value = selectMode.baseVal + targetId;
                    return;
                }

                const cursorPosition = cell.selectionStart;
                const textLen = cell.value.length;

                if (e.shiftKey) {
                    let shouldExpand = false;
                    if (e.key === 'ArrowUp' || e.key === 'ArrowDown') shouldExpand = true;
                    if (e.key === 'ArrowLeft' && cursorPosition === 0) shouldExpand = true;
                    if (e.key === 'ArrowRight' && cursorPosition === textLen) shouldExpand = true;

                    if (shouldExpand) {
                        e.preventDefault();
                        let endCol = selectionEnd ? selectionEnd.col : pos.col;
                        let endRow = selectionEnd ? selectionEnd.row : pos.row;

                        if (e.key === 'ArrowUp') endRow = Math.max(1, endRow - 1);
                        if (e.key === 'ArrowDown') endRow = Math.min(ROWS, endRow + 1);
                        if (e.key === 'ArrowLeft') endCol = Math.max(0, endCol - 1);
                        if (e.key === 'ArrowRight') endCol = Math.min(COLS - 1, endCol + 1);

                        selectionEnd = { col: endCol, row: endRow };
                        drawSelection();
                        return;
                    }
                }

                if (!e.shiftKey) {
                    if (e.key === 'ArrowUp') { e.preventDefault(); focusCell(pos.col, pos.row - 1); }
                    if (e.key === 'ArrowDown') { e.preventDefault(); focusCell(pos.col, pos.row + 1); }
                    if (e.key === 'ArrowLeft' && cursorPosition === 0) { e.preventDefault(); focusCell(pos.col - 1, pos.row); }
                    if (e.key === 'ArrowRight' && cursorPosition === textLen) { e.preventDefault(); focusCell(pos.col + 1, pos.row); }
                }
            }
        }

        function handleCopyCut(e, isCut) {
            const selectedElements = document.querySelectorAll('.selected-range');
            const isMultiSelect = selectedElements.length > 1 && selectionStart && selectionEnd;
            const active = document.activeElement;

            if (!isMultiSelect && active && active.tagName === 'TEXTAREA' && active.selectionStart !== active.selectionEnd) {
                return; 
            }

            let minC, maxC, minR, maxR;
            
            if (isMultiSelect) {
                minC = Math.min(selectionStart.col, selectionEnd.col);
                maxC = Math.max(selectionStart.col, selectionEnd.col);
                minR = Math.min(selectionStart.row, selectionEnd.row);
                maxR = Math.max(selectionStart.row, selectionEnd.row);
            } else if (active && active.tagName === 'TEXTAREA' && active.id) {
                const pos = parseCellId(active.id);
                minC = maxC = pos.col;
                minR = maxR = pos.row;
            } else {
                return;
            }

            clipboardRangeData = { originCol: minC, originRow: minR, cells: [] };
            
            for (let r = minR; r <= maxR; r++) {
                for (let c = minC; c <= maxC; c++) {
                    const id = getCellId(c, r);
                    const inputEl = document.getElementById(id);
                    
                    const formula = (active === inputEl) ? inputEl.value : (data[id] || '');
                    
                    clipboardRangeData.cells.push({ 
                        dCol: c - minC, 
                        dRow: r - minR, 
                        formula: formula 
                    });
                    
                    if (isCut) {
                        data[id] = '';
                        if (inputEl) inputEl.value = '';
                    }
                }
            }
            if (isCut) computeAll();
            showToast(`已${isCut ? '剪下' : '複製'} ${clipboardRangeData.cells.length} 個儲存格`);
        }

        document.addEventListener('copy', (e) => handleCopyCut(e, false));
        document.addEventListener('cut', (e) => handleCopyCut(e, true));

        // ====== 修改後的貼上邏輯：支援一格貼多格並動態更新參數 ======
        document.addEventListener('paste', (e) => {
            const active = document.activeElement;
            if (!active || active.tagName !== 'TEXTAREA' || !active.id || !clipboardRangeData || clipboardRangeData.cells.length === 0) return;

            e.preventDefault(); 
            const pos = parseCellId(active.id);
            const selectedElements = document.querySelectorAll('.selected-range');

            // 核心功能：如果剪貼簿只有 1 格，且使用者在畫面上選取了超過 1 格
            if (clipboardRangeData.cells.length === 1 && selectedElements.length > 1) {
                const sourceCell = clipboardRangeData.cells[0];
                
                selectedElements.forEach(el => {
                    const targetPos = parseCellId(el.id);
                    if (targetPos) {
                        // 計算目前這個目的地儲存格，相對於原複製點的行列位移
                        const colOffset = targetPos.col - clipboardRangeData.originCol;
                        const rowOffset = targetPos.row - clipboardRangeData.originRow;
                        
                        // 動態計算並修正新公式的參數
                        const shiftedFormula = shiftFormula(sourceCell.formula, colOffset, rowOffset);
                        data[el.id] = shiftedFormula;
                        el.value = shiftedFormula; 
                    }
                });
                
                computeAll();
                showToast(`已將 1 個儲存格資料複製到 ${selectedElements.length} 個目的儲存格`);
                return;
            }

            // 預設功能：一般的單格對單格，或是多格範圍對多格範圍貼上
            const colOffset = pos.col - clipboardRangeData.originCol;
            const rowOffset = pos.row - clipboardRangeData.originRow;
            
            clipboardRangeData.cells.forEach(cell => {
                const targetCol = pos.col + cell.dCol;
                const targetRow = pos.row + cell.dRow;
                
                if (targetCol >= 0 && targetCol < COLS && targetRow >= 1 && targetRow <= ROWS) {
                    const targetId = getCellId(targetCol, targetRow);
                    const shiftedFormula = shiftFormula(cell.formula, colOffset, rowOffset);
                    data[targetId] = shiftedFormula;
                    
                    const targetEl = document.getElementById(targetId);
                    if (targetEl) {
                        targetEl.value = shiftedFormula;
                    }
                }
            });
            
            computeAll();
            showToast(`已貼上 ${clipboardRangeData.cells.length} 個儲存格資料`);
            
            const maxDCol = Math.max(...clipboardRangeData.cells.map(c => c.dCol));
            const maxDRow = Math.max(...clipboardRangeData.cells.map(c => c.dRow));
            selectionStart = pos;
            selectionEnd = { 
                col: Math.min(pos.col + maxDCol, COLS - 1), 
                row: Math.min(pos.row + maxDRow, ROWS) 
            };
            drawSelection();
        });

        function shiftFormula(formula, colOffset, rowOffset) {
            if (!formula.startsWith('=')) return formula; 
            return formula.replace(/([A-Za-z]+)([0-9]+)/g, (match, colStr, rowStr) => {
                let newColCode = colStr.toUpperCase().charCodeAt(0) + colOffset;
                let newRow = parseInt(rowStr) + rowOffset;
                if (newColCode < 65 || newRow < 1) return match;
                return String.fromCharCode(newColCode) + newRow;
            });
        }

        function computeAll() {
            for (let r = 1; r <= ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const id = getCellId(c, r);
                    const cell = document.getElementById(id);
                    if (cell && document.activeElement !== cell) {
                         cell.value = ''; 
                    }
                }
            }

            for (let r = 1; r <= ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const id = getCellId(c, r);
                    const cell = document.getElementById(id);
                    if (document.activeElement !== cell) {
                        const val = data[id];
                        if (val) {
                            if (val.startsWith('=')) {
                                try { cell.value = evaluateFormula(val.substring(1)); } 
                                catch (e) { cell.value = '#ERROR'; }
                            } else {
                                cell.value = val;
                            }
                        }
                    }
                }
            }
        }

        function evaluateFormula(formula) {
            let parsedFormula = formula.replace(/[A-Za-z]+[0-9]+/g, (match) => {
                let cellVal = data[match.toUpperCase()];
                if (cellVal && cellVal.startsWith('=')) return evaluateFormula(cellVal.substring(1));
                const num = parseFloat(cellVal);
                return isNaN(num) ? 0 : num; 
            });
            if (parsedFormula.trim() === '') return '';
            return new Function('return ' + parsedFormula)();
        }

        // ====== 快捷鍵儲存功能 (Ctrl+S / Cmd+S / Alt+S) ======
        document.addEventListener('keydown', function(e) {
            // 檢查是否按下了 'S' 或 's' 鍵
            if (e.key === 's' || e.key === 'S') {
                // 檢查是否同時按下了 Ctrl (Windows), Meta (Mac 的 Command 鍵), 或 Alt
                if (e.ctrlKey || e.metaKey || e.altKey) {
                    e.preventDefault(); // 強制阻擋瀏覽器預設的「儲存網頁」視窗
                    saveData();         // 呼叫試算表的儲存函數
                }
            }
        });        


        initTable();
    </script>
</body>
</html>
