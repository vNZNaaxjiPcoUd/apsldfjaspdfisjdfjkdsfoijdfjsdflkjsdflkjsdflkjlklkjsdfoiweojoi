<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圖片轉 Base64</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f9f9f9;
            color: #333;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        h2 { margin-top: 0; }
        .file-input-wrapper {
            margin-bottom: 10px;
        }
        img {
            max-width: 100%;
            max-height: 300px;
            object-fit: contain;
            border: 1px dashed #ccc;
            border-radius: 4px;
            display: none;
            padding: 5px;
        }
        textarea {
            width: 100%;
            height: 200px;
            padding: 10px;
            font-family: monospace;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: vertical;
            box-sizing: border-box;
        }
        button {
            padding: 12px 20px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>圖片轉換器</h2>
        
        <div class="file-input-wrapper">
            <input type="file" id="imageInput" accept="image/*">
        </div>

        <img id="imagePreview" alt="圖片預覽">
        
        <textarea id="base64Output" placeholder="Base64 編碼將顯示在這裡..." readonly></textarea>
        
        <button id="copyBtn">複製 Base64 代碼</button>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const imagePreview = document.getElementById('imagePreview');
        const base64Output = document.getElementById('base64Output');
        const copyBtn = document.getElementById('copyBtn');

        // 當使用者選擇檔案時觸發
        imageInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            
            if (file) {
                const reader = new FileReader();
                
                // 檔案讀取完成後的處理
                reader.onload = function(e) {
                    const base64String = e.target.result; // 這會包含 data:image/jpeg;base64,... 標頭
                    
                    // 顯示在文字框中
                    base64Output.value = base64String;
                    
                    // 顯示圖片預覽
                    imagePreview.src = base64String;
                    imagePreview.style.display = 'block';
                };
                
                // 以 Data URL 格式讀取檔案 (即 Base64)
                reader.readAsDataURL(file);
            }
        });

        // 複製按鈕功能
        copyBtn.addEventListener('click', async function() {
            if (base64Output.value) {
                try {
                    await navigator.clipboard.writeText(base64Output.value);
                    alert('已成功複製到剪貼簿！');
                } catch (err) {
                    // 兼容舊版瀏覽器的寫法
                    base64Output.select();
                    document.execCommand('copy');
                    alert('已複製到剪貼簿！');
                }
            } else {
                alert('請先上傳圖片進行轉換。');
            }
        });
    </script>

</body>
</html>
