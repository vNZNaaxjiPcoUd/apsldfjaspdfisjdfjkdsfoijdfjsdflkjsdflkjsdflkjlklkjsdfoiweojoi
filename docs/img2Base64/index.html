<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>檔案轉 Base64 產生器</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            padding: 2rem;
        }
        .container {
            background: #fff;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
        }
        h2 {
            margin-top: 0;
            color: #2c3e50;
        }
        .file-input-wrapper {
            margin-bottom: 1.5rem;
        }
        input[type="file"] {
            display: block;
            width: 100%;
            padding: 0.5rem;
            border: 1px dashed #bdc3c7;
            background: #fdfdfd;
            border-radius: 5px;
            cursor: pointer;
        }
        #preview {
            max-width: 100%;
            max-height: 300px;
            margin-bottom: 1rem;
            border-radius: 5px;
            display: none; /* 預設隱藏，確認是圖片才顯示 */
        }
        textarea {
            width: 100%;
            height: 150px;
            padding: 0.5rem;
            border: 1px solid #bdc3c7;
            border-radius: 5px;
            resize: vertical;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.4;
            box-sizing: border-box;
            background-color: #f9f9f9;
        }
        .action-group {
            margin-top: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        button {
            padding: 0.5rem 1.5rem;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #2980b9;
        }
        button:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }
        #statusMessage {
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>📂 檔案轉 Base64 Data URI 工具</h2>
        
        <div class="file-input-wrapper">
            <input type="file" id="fileInput" title="請選擇要轉換的檔案">
        </div>

        <!-- 圖片預覽區塊 -->
        <img id="preview" alt="圖片預覽">

        <textarea id="resultText" readonly placeholder="轉換後的 Base64 字串將會顯示在這裡..."></textarea>
        
        <div class="action-group">
            <button id="copyBtn" disabled>複製字串</button>
            <span id="statusMessage"></span>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const resultText = document.getElementById('resultText');
        const copyBtn = document.getElementById('copyBtn');
        const statusMessage = document.getElementById('statusMessage');

        // 監聽使用者選擇檔案的動作
        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            
            // 如果使用者取消選擇，則還原預設狀態
            if (!file) {
                resultText.value = '';
                preview.style.display = 'none';
                copyBtn.disabled = true;
                statusMessage.textContent = '';
                return;
            }

            const reader = new FileReader();

            // 檔案讀取完成後的處理
            reader.onload = (e) => {
                const dataUri = e.target.result;
                
                // 將生成的 Data URI 填入 textarea
                resultText.value = dataUri;
                
                // 啟用複製按鈕
                copyBtn.disabled = false;
                statusMessage.textContent = ''; // 清空狀態訊息

                // 若上傳的是圖片檔，則顯示預覽
                if (file.type.startsWith('image/')) {
                    preview.src = dataUri;
                    preview.style.display = 'block';
                } else {
                    preview.style.display = 'none';
                }
            };

            // 開始將檔案讀取為 Data URL
            reader.readAsDataURL(file);
        });

        // 監聽複製按鈕點擊事件
        copyBtn.addEventListener('click', async () => {
            try {
                // 使用現代 Clipboard API 複製文字
                await navigator.clipboard.writeText(resultText.value);
                statusMessage.style.color = '#27ae60';
                statusMessage.textContent = '✅ 複製成功！';
                
                // 2 秒後清除成功提示
                setTimeout(() => {
                    statusMessage.textContent = '';
                }, 2000);
            } catch (err) {
                // 備用方案或是報錯
                statusMessage.style.color = '#e74c3c';
                statusMessage.textContent = '❌ 複製失敗，請手動全選複製。';
                
                // 嘗試傳統方式選取文字
                resultText.select();
            }
        });
    </script>
</body>
</html>
