<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上傳</title>
    <style>
        /* 基礎樣式重置 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f4f7f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* 上傳卡片容器 */
        .upload-card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        h3 {
            margin-top: 0;
            color: #333;
            font-size: 1.5rem;
        }

        /* 隱藏原生檔案輸入框 */
        #fileInput {
            display: none;
        }

        /* 自定義「選擇檔案」按鈕樣式 */
        .file-label {
            display: block;
            background-color: #f8f9fa;
            border: 2px dashed #cbd5e0;
            padding: 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
            color: #718096;
        }

        .file-label:hover {
            border-color: #4a90e2;
            background-color: #f0f7ff;
            color: #4a90e2;
        }

        /* 「開始上傳」按鈕樣式 */
        .btn-start {
            width: 100%;
            background-color: #4a90e2;
            color: white;
            border: none;
            padding: 12px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s ease;
        }

        .btn-start:hover {
            background-color: #357abd;
        }

        .btn-start:active {
            transform: scale(0.98);
        }

        /* 狀態文字與檔名顯示 */
        #status, #fileName {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #666;
            min-height: 1.2rem;
        }

        #fileName {
            color: #4a90e2;
            font-weight: 500;
            word-break: break-all;
        }
    </style>
</head>
<body>

<div class="upload-card">
 
    <!-- 使用 Label 綁定 input，這樣點擊 Label 就等於點擊 input -->
    <label for="fileInput" class="file-label" id="dropArea">
        <span id="labelTexts">點擊此處選擇檔案</span>
        <div id="fileName"></div>
    </label>
    
    <input type="file" id="fileInput" accept="*/*">
    
    <button class="btn-start" onclick="uploadFile()">開始</button>
    
    <p id="status"></p>
</div>


<script src="https://h.jwint.net/static/crypto-js.min.js"></script>
<script>

// scriptTest.client.2.html

let APIKey = "";
const SALT = "Nxk98ahIR50AtZBiLxowpmhaWXQCg8E";

function generateToken(key) {
    while (!APIKey) {
        APIKey = prompt("請輸入密碼:", "");
        if(APIKey === null) {
            document.getElementById('status').innerText = "必須輸入密碼才能繼續";
            return null;
        }
    }
    const kNow = new Date().toISOString().slice(0, 10).replace(/-/g, '');
    const rawString = APIKey + SALT + kNow + key;
    return CryptoJS.SHA512(CryptoJS.enc.Utf8.parse(rawString)).toString();
}

const fileInput = document.getElementById('fileInput');
const fileNameDisplay = document.getElementById('fileName');
const labelTexts = document.getElementById('labelTexts');
const status = document.getElementById('status');

// 當使用者選擇檔案後，更新介面顯示檔名
fileInput.addEventListener('change', function() {
    if (this.files && this.files.length > 0) {
        const name = this.files[0].name;
        fileNameDisplay.textContent = "已選擇: " + name;
        labelTexts.textContent = "更改檔案"; // 變更提示文字
        status.textContent = ""; // 清除舊狀態
    }
});


function uploadFile() {

    if (!fileInput.files.length) {
        status.style.color = "red";
        status.textContent = "請先選擇檔案！";
        return;
    }
    
    
    const file = fileInput.files[0];
    const reader = new FileReader();

    reader.onload = function(e) {
      const base64Data = e.target.result;
      
      const token = generateToken(file.name);
      if (!token) return; 

      const payload = {
          base64: base64Data,
          mimeType: file.type,
          fileName: file.name,
          token: token
      };

      status.style.color = "#28a745";
      status.textContent = "上傳中...";

      const scriptURL = "https://script.google.com/macros/s/AKfycbxtRO4WJfBDxizZM7JvBYr-nKC8PI3fFVKxC3HUcHwKL0jRjPrg7Lge2lbcq6AbwNXrPQ/exec";
      fetch(scriptURL, {
          method: "POST", 
          body: JSON.stringify(payload)
      })
      .then(res => res.json())
      .then(data => {
          if(data.result === "success") {
          status.innerHTML =  `上傳成功！<a href="${data.fileUrl}" target="_blank">查看檔案</a>`;
          } else {
          status.textContent =  "上傳失敗: " + data.message;
          APIKey = ""; // 清除密碼，讓使用者下次上傳時需要重新輸入
          }
      })
      .catch(error => {
          status.textContent = "錯誤: " + error;
          APIKey = ""; // 清除密碼，讓使用者下次上傳時需要重新輸入
      });
    };

    reader.readAsDataURL(file); 
}
</script>
</body>
</html>
