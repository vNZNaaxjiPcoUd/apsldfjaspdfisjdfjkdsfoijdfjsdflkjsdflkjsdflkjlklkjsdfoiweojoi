<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上傳</title>
    <style>
        /* 基礎樣式重置 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f4f7f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* 上傳卡片容器 */
        .upload-card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        h3 {
            margin-top: 0;
            color: #333;
            font-size: 1.5rem;
        }

        /* 隱藏原生檔案輸入框 */
        #fileInput {
            display: none;
        }

        /* 自定義「選擇檔案」按鈕樣式 */
        .file-label {
            display: block;
            background-color: #f8f9fa;
            border: 2px dashed #cbd5e0;
            padding: 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
            color: #718096;
        }

        .file-label:hover {
            border-color: #4a90e2;
            background-color: #f0f7ff;
            color: #4a90e2;
        }

        /* 「開始上傳」按鈕樣式 */
        .btn-start {
            width: 100%;
            background-color: #4a90e2;
            color: white;
            border: none;
            padding: 12px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s ease;
        }

        .btn-start:hover {
            background-color: #357abd;
        }

        .btn-start:active {
            transform: scale(0.98);
        }

        /* 狀態文字與檔名顯示 */
        #status, #fileName {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #666;
            min-height: 1.2rem;
        }

        #fileName {
            color: #4a90e2;
            font-weight: 500;
            word-break: break-all;
        }
    </style>
</head>
<body>

<div class="upload-card">
 
    <!-- 使用 Label 綁定 input，這樣點擊 Label 就等於點擊 input -->
    <label for="fileInput" class="file-label" id="dropArea">
        <span id="labelTexts">點擊此處選擇檔案</span>
        <div id="fileName"></div>
    </label>
    
    <input type="file" id="fileInput" accept="*/*">
    
    <button class="btn-start" onclick="uploadFile()">開始</button>
    
    <p id="status"><a href="https://lh3.googleusercontent.com/d/1SazSWZqJ8QVuXXNiYA37bYNVG-hwiZh3" target="_blank">圖片例子</a></p>

</div>


<script src="https://h.jwint.net/static/crypto-js.min.js"></script>
<script src="ul.js">

</script>
</body>
</html>
