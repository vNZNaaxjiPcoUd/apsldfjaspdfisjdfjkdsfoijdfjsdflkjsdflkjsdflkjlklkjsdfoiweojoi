
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 轉 Markdown 轉換器 (固定比例版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/turndown/dist/turndown.js"></script>
    <style>
        /* 核心自定義樣式 */
        #input-area {
            /* 確保內容不會擠壓到另一邊，且超出時顯示滾動條 */
            overflow-x: auto;
            overflow-y: auto;
            white-space: normal; /* 若想強制完全不換行可改為 nowrap，但通常內容建議保留原樣 */
        }

        /* 讓貼進來的 HTML 內容保持其原始寬度，不被父層擠壓 */
        #input-area > * {
            min-width: max-content;
        }

        /* 美化滾動條 (可選) */
        ::-webkit-scrollbar {
            height: 8px;
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col overflow-hidden">

    <header class="bg-slate-800 text-white p-3 shadow-md flex justify-between items-center">
        <div>
            <h1 class="text-lg font-bold">HTML ⮕ Markdown 轉換器</h1>
            <p class="text-xs text-slate-400">左側貼上內容，右側即時生成</p>
        </div>
        <div class="text-xs bg-slate-700 px-3 py-1 rounded text-slate-300">
            markdown
        </div>
    </header>

    <main class="flex flex-1 overflow-hidden p-4 gap-4">
        
        <section class="w-1/2 flex flex-col min-w-[50%]">
            <div class="flex justify-between items-center mb-2">
                <label class="font-semibold text-gray-700">左側：貼上 HTML 畫面</label>
                <button onclick="document.getElementById('input-area').innerHTML=''" class="text-xs text-red-500 hover:underline">清空</button>
            </div>
            <div id="input-area" 
                 contenteditable="true" 
                 class="flex-1 p-4 bg-white border-2 border-blue-200 rounded-lg shadow-inner focus:outline-none focus:border-blue-500"
                 placeholder="在這裡貼上網頁內容...">
            </div>
        </section>

        <section class="w-1/2 flex flex-col min-w-[50%]">
            <div class="flex justify-between items-center mb-2">
                <label class="font-semibold text-gray-700">右側：Markdown 結果</label>
                <button id="copy-btn" class="bg-blue-600 text-white px-4 py-1 rounded text-sm hover:bg-blue-700 transition active:scale-95">
                    複製結果
                </button>
            </div>
            <textarea id="output-area" 
                      class="flex-1 p-4 bg-gray-50 border border-gray-300 rounded-lg font-mono text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20"
                      readonly 
                      placeholder="Markdown 代碼將顯示於此..."></textarea>
        </section>

    </main>

    <script>
        const turndownService = new TurndownService({
            headingStyle: 'atx',
            codeBlockStyle: 'fenced'
        });

        const inputArea = document.getElementById('input-area');
        const outputArea = document.getElementById('output-area');
        const copyBtn = document.getElementById('copy-btn');

        // 轉換邏輯
        function performConversion() {
            const htmlContent = inputArea.innerHTML;
            if (htmlContent.trim() === "" || htmlContent === "<br>") {
                outputArea.value = "";
                return;
            }
            const markdown = turndownService.turndown(htmlContent);
            outputArea.value = markdown;
        }

        // 監聽貼上與輸入
        inputArea.addEventListener('input', performConversion);
        inputArea.addEventListener('paste', () => setTimeout(performConversion, 20));

        // 複製按鈕
        copyBtn.addEventListener('click', () => {
            if (!outputArea.value) return;
            navigator.clipboard.writeText(outputArea.value).then(() => {
                const originalText = copyBtn.innerText;
                copyBtn.innerText = "成功！";
                copyBtn.classList.replace('bg-blue-600', 'bg-green-600');
                setTimeout(() => {
                    copyBtn.innerText = originalText;
                    copyBtn.classList.replace('bg-green-600', 'bg-blue-600');
                }, 2000);
            });
        });
    </script>

    <style>
        /* Placeholder 實作 */
        [contenteditable]:empty:before {
            content: attr(placeholder);
            color: #94a3b8;
        }
    </style>
</body>
</html>
