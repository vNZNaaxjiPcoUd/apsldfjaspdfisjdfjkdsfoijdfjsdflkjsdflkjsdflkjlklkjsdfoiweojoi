
<!DOCTYPE html>
<html lang="en-US">
<head>
	<meta charset="UTF-8">
	<base target="_blank">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>景</title>
<style>

body {
    font-family: 'Inter', sans-serif;
    font-size: 16px; /* 基礎文字大小 */
    color: #f0f0f0; /* 淺灰文字，適應黑底 */
    background-color: #000000; /* 純黑背景 */
}

a,a.visited {
	color: inherit;
	text-decoration: none;
}

</style>
</head>
<body>

<div id="showID">
	<div id="uID"></div>
</div>

<dialog id="inputDialog" style="background-color: #1a1a1a; color: #d3d3d3; border: none; border-radius: 16px; padding: 30px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8);">
	<h2 id="inpTitle" style="margin-top: 0; color: #ffd700; font-size: 16px; font-weight: bold; margin-bottom: 5px;"></h2>
	<input type="text" id="inputT" placeholder="輸入內容" style="background: transparent; border: none; border-bottom: 2px solid #ffd700; color: #ffffff; padding: 8px 12px; outline: none; font-size: 16px; text-align: center; width: 80%;"><br><br>
	<button id="okCmd" style="background-color: #ffd700; color: #333333; border: none; border-radius: 10px; padding: 5px 10px; font-weight: bold; cursor: pointer; margin: 0 6px; box-shadow: 0 2px 0 #ccaa00;">確定</button>
	<button id="cancelCmd" style="background-color: #ffd700; color: #333333; border: none; border-radius: 10px; padding: 5px 10px; font-weight: bold; cursor: pointer; margin: 0 6px; box-shadow: 0 2px 0 #ccaa00;">取消</button>    
</dialog>

<script defer>

function getUserInputText(titleTxt="輸入"){
    return new Promise((resolve) => {
    const dialog = document.getElementById('inputDialog');
    const title = document.getElementById('inpTitle');
    const input= document.getElementById('inputT');
    const confirmBtn = document.getElementById('okCmd');
    const cancelBtn = document.getElementById('cancelCmd');

    function onOkBtn() {
      cleanup();
	  handleID(input.value);
	  resolve(true);
    }

    function onCancelBtn() {
      cleanup();
      resolve(false);
    }

    function onKeyDown(event) {
      if (event.key === 'Enter') {
        event.preventDefault(); 
        onOkBtn(); 
      }
    }

    function cleanup() {
      dialog.close();
      confirmBtn.removeEventListener('click', onOkBtn);
      cancelBtn.removeEventListener('click', onCancelBtn);
      input.removeEventListener('keydown', onKeyDown);
    }

	confirmBtn.addEventListener('click', onOkBtn);
    cancelBtn.addEventListener('click', onCancelBtn);
    input.addEventListener('keydown', onKeyDown);
    input.value = ''; 
    title.textContent = titleTxt;
    dialog.showModal();
  });
}

const IDL = 11;

function getID(url) {
		const regex = /[?&]v=([A-Za-z0-9_-]{11})|youtu\.be\/([A-Za-z0-9_-]{11})|\/shorts\/([A-Za-z0-9_-]{11})|\/live\/([A-Za-z0-9_-]{11})/;
		const match = url.match(regex);
		return match ? (match[1] || match[2] || match[3]|| match[4]) : "no";
	}

let jumpA = "";
let jumpB = "";

function handleID(inID){
		let id = inID;
	    const prefix = "FsdGVkX19JAx6y6XDUsl0czQsdOahaolUSW";
        const suffix = "TiT62peYwEcQqvk4bBB7Kb5cBGVAW";

		const idMap = {
		  "test": "wM0g8EoUZ_E",   // 華視
		  "news": "wM0g8EoUZ_E",   // 華視
		  "abc":  "iipR5yUp36o",   // ABC news
		  "sea":  "NSXavEj1R9E",   // 海 聲
		  "500":  "Uk3aOuBV6i0",   // 500
		  "sing": "fzyO3fLV5O0",   // 貝多芬合唱
		  "run":  "KyT4qSK8lJo",   // 地震
		  "eng":  "rpDgKy_KnEM",   // 英文
		  "qin":  "XWmb1BYNOLg",   // 蜀中琴韻
		  "dong": "t8hTKQeLHqk",   // 東海漁歌
		};
		
		// 使用方式
		id = idMap[id?.toLowerCase()] || id;  // 如果沒找到就保持原值

		if(id.length > IDL){
			id = getID(id);
		}
		if (id.length === IDL){

            let nUrl= "";
			nUrl=  "https://h.jwint.net/b?"+prefix+id+suffix;
			const b = `<a href="${nUrl}">一回看</a>`;
			jumpA = nUrl;
			
			nUrl= "https://h.jwint.net/c?"+prefix+id+suffix;
			const c = `<a href="${nUrl}">重複看</a>`;
			jumpB = nUrl;
			
			const bc= b+"<br><br>"+c+"<br><br>";
			document.getElementById("uID").innerHTML = bc;
			window.open(jumpA, '_blank');
		}else {
            
        }	

	}

(async () => {
	while(true){
		const result = await getUserInputText("畫卷");
		if(!result){
			const container = document.getElementById("uID");
			const restartBtn = document.createElement("button");
			restartBtn.textContent = "再來一次";
			restartBtn.addEventListener("click", () => {
				location.reload();
			});
			container.appendChild(restartBtn);

			break;
		}
	}
})();
</script>

</body>
</html>
