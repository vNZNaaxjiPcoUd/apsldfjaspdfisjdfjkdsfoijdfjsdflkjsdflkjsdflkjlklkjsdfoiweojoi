
<!DOCTYPE html>
<html lang="en-US">
<head>
	<meta charset="UTF-8">
	<base target="_blank">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>景</title>
<style>

body {
    font-family: 'Inter', sans-serif;
    font-size: 16px; /* 基礎文字大小 */
    color: #f0f0f0; /* 淺灰文字，適應黑底 */
    background-color: #000000; /* 純黑背景 */
}
a,
a.visited {
	color: inherit;
	text-decoration: none;
}

#showID {display: none;}

#helloWorld { display: block; }

#passwordOverlay {
	position: fixed;
	top: 0; left: 0; right: 0; bottom: 0;
	background: rgba(0,0,0,0.95);
	display: block;
	align-items: center;
	flex-direction: column;
	z-index: 999;
}
#passwordInput {
	font-size: 16px;
	margin-top: 8dvh;
	padding: 5px 10px;
	text-align: center;
	border: none;
	border-bottom: 3px solid #00ff88;
	background: transparent;
	color: #fff;
	outline: none;
}
#passwordInput:focus { border-bottom-color: #00ff88; }

#startButton {
    margin-top: 15px;
    padding: 2px 15px;
    font-size: 14px;
    color: #000000;
    background: #00ff88;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    /* 讓所有屬性變化（如背景色、變形）都有平滑的過渡效果 */
    transition: all 0.2s ease-in-out; 
}

/* 當滑鼠懸停（移動到上面）時觸發 */
#startButton:hover {
    background: #00e676; /* 微調背景色讓互動更明顯 */
    /* 套用自訂的跳動動畫，持續 0.4 秒 */
    animation: bounce 0.4s ease-in-out;
    /* 動畫結束後保持稍微放大的狀態，增加回饋感 */
    transform: scale(1.05); 
}

/* 移除錯誤的 transition，改為 focus 時的 focus-visible 樣式（選填，對無障礙網頁友好） */
#startButton:focus-visible {
    outline: 2px solid #000;
}

/* 定義「動一下」的關鍵字動畫 */
@keyframes bounce {
    0% {
        transform: scale(1);
    }
    50% {
        transform: scale(1.12) translateY(-4px); /* 向上跳並放大 */
    }
    75% {
        transform: scale(0.98) translateY(1px);  /* 輕微回彈 */
    }
    100% {
        transform: scale(1.05) translateY(0);    /* 回到 hover 的放大狀態 */
    }
}

</style>

</head>
