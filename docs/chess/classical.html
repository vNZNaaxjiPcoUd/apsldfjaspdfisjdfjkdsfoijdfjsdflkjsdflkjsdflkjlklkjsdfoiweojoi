    .btn-blue { background-color: #2196F3; }
    .btn-blue:hover { background-color: #1976D2; }
    .btn-orange { background-color: #ff9800; }

    .success { color: #2e7d32; } .error { color: #d32f2f; } .loading { color: #1976d2; }

    // ==========================================================
    
    window.onload = function() {
      const lines = rawFenData.split('\n');
      const select = document.getElementById('scenario-select');
      select.innerHTML = ''; 
      let validCount = 0;

      for (let line of lines) {
        line = line.trim();
        if (!line) continue;

        const fenMatch = line.match(/([a-zA-Z1-9]+\/){9}[a-zA-Z1-9]+/);
        if (fenMatch) {
          validCount++;
          let fullFen = fenMatch[0] + " w - - 0 1"; 
          let showCount = validCount - 1;
          let title = `第 ${showCount.toString().padStart(3, '0')} 局`;

          let opt = document.createElement('option');
          opt.value = fullFen;
          opt.innerHTML = title;
          select.appendChild(opt);
        }
      }
      
      if(validCount === 0) {
        document.getElementById('count-display').textContent = `載入失敗`;
      } else {
        document.getElementById('count-display').textContent = ``;
      }
    };

    function buildBoardFromFEN(fen) {
      let board = Array.from({length: 10}, () => Array(9).fill(''));
      if (!fen) return board;
      
      let boardPart = fen.split(' ')[0];
      let rows = boardPart.split('/');
      
      for (let r = 0; r < 10; r++) {
        if (!rows[r]) continue;
        let c = 0;
        for (let i = 0; i < rows[r].length; i++) {
          let char = rows[r][i];
          
          if (char >= '1' && char <= '9') {
            c += parseInt(char, 10);
          } else {
            if (char === 'b') char = 'e';
            else if (char === 'B') char = 'E';
            else if (char === 'n') char = 'h';
            else if (char === 'N') char = 'H';
            
            if (c < 9) {
              board[r][c] = char;
              c++;
            }
          }
        }
      }
      return board;
    }

    function showStatus(text, type) {
      const msgDiv = document.getElementById('status-msg');
      msgDiv.textContent = text;
      msgDiv.className = type;
    }

    // 🌟 新增的跳轉房間函數
    function jumpToRoom() {
      const roomName = document.getElementById('room-input').value.trim();
      if (!roomName) {
        showStatus('請先輸入房間名！', 'error');
        return;
      }
      // 開啟新分頁跳轉到指定房間，並將房間名稱編碼附加在網址後方
      window.open('./chessOne.html?' + encodeURIComponent(roomName), '_blank');
    }

    // --- 觸發來源：下拉選單 ---
    function applyScenario() {
      const selectedFEN = document.getElementById('scenario-select').value;
      if (!selectedFEN) { showStatus('選單中沒有棋局！', 'error'); return; }
      executeLayout(selectedFEN, document.getElementById('set-btn'));
    }

    // --- 觸發來源：自訂 FEN 輸入框 ---
    function applyCustomFen() {
      let customFen = document.getElementById('custom-fen').value.trim();
      if (!customFen) { showStatus('請先貼上 FEN 字串！', 'error'); return; }
      
      // 簡單補齊 FEN 格式（確保有後面的參數供 AI 讀取）
      if (customFen.indexOf(' ') === -1) { customFen += " w - - 0 1"; }
      
      executeLayout(customFen, document.getElementById('set-custom-btn'));
    }

    function fPlayer(str){
        let plr = str.split(' ')[1]; 
        if(plr !== 'b') plr = 'r'
        return plr;
    };

    // --- 核心佈局邏輯（已整合防 Bug 機制） ---
    async function executeLayout(fenString, btnElement) {
      const roomName = document.getElementById('room-input').value.trim();
      const passwordInput = document.getElementById('admin-password').value;
      const btn1 = document.getElementById('set-btn');
      const btn2 = document.getElementById('set-custom-btn');

      if (!roomName) { showStatus('請輸入房間名！', 'error'); return; }
      if (!passwordInput) { showStatus('請輸入管理員密碼！', 'error'); return; }

      try {
        const bytes = CryptoJS.AES.decrypt(ENC_PASSWD, passwordInput);
        const decryptedText = bytes.toString(CryptoJS.enc.Utf8);
        GAS_URL = decryptedText;

        //if (decryptedText !== EXPECTED_TEXT) {
        if (!decryptedText) {
          showStatus('❌ 密碼錯誤，無法解鎖盤面！', 'error');
          return;
        }
      } catch (e) {
        showStatus('❌ 密碼錯誤，解密失敗！', 'error');
        return;
      }

      const targetBoard = buildBoardFromFEN(fenString);

      // 鎖定兩顆按鈕
      btn1.disabled = true; btn2.disabled = true;
      showStatus('驗證通過！正在清理舊資料並重啟房間...', 'loading');

      try {
        // 1. 發送 restart 清除幽靈軌跡
        await fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: 'restart', room: roomName, playerId: 'ADMIN_FORCE_RESET', restartAction: 'agree' })
        });

        // 稍微等待 GAS 清除完畢
        await new Promise(r => setTimeout(r, 1000));

        showStatus('正在寫入殘局陣型與 AI 狀態...', 'loading');

        // 2. 獲取空房間狀態
        let getResponse = await fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: 'get', room: roomName })
        }).then(res => res.json());

        if (getResponse && getResponse.state) {
          let state = getResponse.state;

          // 3. 注入盤面與防呆屬性
          state.board = targetBoard; 
          
          // 🌟 新增記憶點：強制把這個佈局盤面存為「重新開局」跟「覆盤」的基準點
          state.initialBoard = JSON.parse(JSON.stringify(targetBoard));
          state.initialTurn = fPlayer(fenString);

          state.turn = fPlayer(fenString); 
          state.status = 'playing';
          state.checkMsg = '';
          state.history = []; 
          state.lastMove = null;
          
          // 🌟 關鍵防護：強制把 FEN 寫入狀態，避免 AI 誤判
          state.initialFen = fenString; 
          state.fen = fenString;
          state.startFen = fenString;

          state.restartRequest = null;
          state.undoRequest = null;
          state.lastActivityTime = new Date().getTime();

          let moveResponse = await fetch(GAS_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action: 'move', room: roomName, state: state })
          }).then(res => res.json());

          if (moveResponse) {
            showStatus('✅ 佈局成功！請切換回棋盤查看。', 'success');
          } else {
            showStatus('❌ 佈局寫入失敗。', 'error');
          }
        } else {
          showStatus('❌ 讀取房間失敗，可能是 GAS_URL 錯誤。', 'error');
        }
      } catch (error) {
        showStatus('❌ 網路連線錯誤：' + error.message, 'error');
      } finally {
        // 解鎖兩顆按鈕
        btn1.disabled = false; btn2.disabled = false;
      }
    }
  </script>
