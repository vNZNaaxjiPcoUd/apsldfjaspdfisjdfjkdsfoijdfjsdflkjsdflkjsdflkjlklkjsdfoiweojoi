<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <base target="_blank">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="./manifest.json">
    <title>Note</title>
    
    <script src="./crypto-js.min.js"></script>
    <script src="./marked.min.js"></script>
    <script src="./mermaid.min.js"></script>
    <script src="./index.umd.js"></script>
    <link rel="apple-touch-icon" href="./icon-192x192.png">
    <link rel="stylesheet" href="./style_black.css">

<style>

html {
  scroll-behavior: smooth;
}

.control-btn {
    background-color: #a400c1;
}

#mdShowArea {
    /*height: 160vh;*/
}
#mkdwPage {
    /*height: 160vh;*/
    width: 100%;
    max-width: 100%;      /* 確保絕對不會超過父層 */
    overflow-y: auto;
    overflow-x: hidden;   /* 強制隱藏水平捲軸，防止意外溢出 */
    -webkit-overflow-scrolling: touch;     
    height: 100dvh;
}

</style>
</head>
<body>

    <div class="main-container">
        <div class="tabs" id="TAB-BTN">
            <button class="tab-button" title="查看書冊本文" onclick="openTab(event, 'TabB')">書</button>
            <button class="tab-button" title="查看各指令" onclick="openTab(event, 'TabA')">令</button>
            <button class="tab-button" id="mdvwBtn" title="markdown view" onclick="showMarkdownView()">拓</button>
            <button class="tab-button" id="addSubPageBtn" title="新增小冊">增</button>
            <button class="tab-button" id="saveDBBtn2" title="儲存書冊" onclick="saveDBBtnHandler()">存</button>
        </div>
        <div id="mkdwPage">
            <button id="toc-btn">☰</button>
            <button id="backToTopBtn" title="回到最前面">^</button>
            <nav id="toc" class="toc-sidebar"></nav>
            <div id="mdShowArea" style="display:none"></div>
        </div>
        <div id="TabA" class="tab-content">
            <div class="control-row">
                <!--input type="password" id="aesKey" value="YGG636zJCXhelP0SEpqN7h1xRGXOUtezGg2LSpcLWuNh8g8z!!" placeholder="輸入 AES 密鑰"-->
            </div>
            
            <div class="control-row">
                <button class="control-btn" id="saveDBBtn" title="保存">存</button>
                <button class="control-btn" id="readDBBtn" title="讀取">提</button>

                <button class="control-btn" id="encryptBtn" title="加密">封</button>
                <button class="control-btn" id="decryptBtn" title="解密">解</button>
                <button class="control-btn" id="copyBtn" title="複製密文">謄</button>
                
                <button class="control-btn" id="nameBtn" title="更改本冊名" onclick = "changeKeyName()">名</button>
                <input type="text" id="keyNameDef" title="本冊名稱"value="SSS" placeholder="本冊名稱">
                <button class="control-btn" id="listBtn" title="列出所有書冊" onclick = "listKeyNames()">列</button>
                <button class="control-btn" id="delBtn" title="刪除書冊" onclick = "deleteKeyName()">刪</button>
                <input type="text" id="delNameDef" title="刪除書冊的名稱" value="" placeholder="欲刪書本名稱">

                <button class="control-btn" id="exportBtn" title="下載書冊">出</button>
                <button class="control-btn" id="importBtnTrigger" title="載入書冊">入</button>
                <input type="file" id="importFile" title="載入書冊名稱" placeholder="載入書冊名稱.txt" accept=".txt" style="display: none;">

                <button class="control-btn" id="markdownViewBtn" title="Markdown View ctl-E" onclick="showMarkdownView()">拓</button>

                <button class="control-btn" id="aesKeyBtn" title="修改密鑰" onclick = "changeAesKey()">密</button>
                <input type="password" id="aesKey" title="密鑰" value="YGG636zJCXhelP0SEpqN7h1xRGXOUtezGg2LSpcLWuNh8g8z!!" placeholder="密鑰">


                <!--button class="external-link-btn" onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLSfeuE18UeYpKIAhayFX9PCrIyQaYxpt985WrB_AYIb1V-dx3A/viewform', '_blank')">庫</button>
                <button class="external-link-btn" onclick="window.open('https://h.jwint.net/cipherEncryptionData', '_blank')">核</button-->
            </div>
            <!--div id="mdShowArea"></div-->
            <textarea id="encryptedContent" placeholder=""></textarea>
        </div>

        <div id="TabB" class="tab-content">
            <!-- 修改結構：移除 inline style，改用 class -->
            <div class="sub-tabs-header">
                <div id="subTabNav" class="sub-tabs"></div>
                <!--button id="addSubPageBtn">增</button-->
            </div>
            
            <div id="subTabContentContainer" class="sub-tab-content-container"></div>
        </div>
        
        <div id="TabC" class="tab-content">
            <!--div id="markdownView"></div-->
        </div>
    </div>
    
    <div id="statusMessage" class="status-info"  onclick="showMarkdownView()">待...</div>


    <script src="./note.obf.js">

    </script>


<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('SW registered!', reg))
        .catch(err => console.log('SW registration failed: ', err));
    });
  }
</script>

</body>
</html>
