// --- 取得 URL 參數 (作為 Key) ---
function getDynamicKeyName() {
    const search = window.location.search;
    if( gKeyName !== ""){
        return gKeyName;
    }
    /*
    if (search && search.length > 1) {
        const param = search.substring(1).split('=')[0];
        return param || "A";
    }*/

    // getDynamicKeyName 的新版本：更完整的 URL 參數解析，並保留第一個參數的 key 和 value
    // ex: https://url.com/?id=123&foo=bar -> key: id, value: 123
    let firstKey = "";
    let firstValue = "";
    const paramsFromURL = new URLSearchParams(window.location.search);
    //const entries = Object.fromEntries(paramsFromURL.entries());
    //console.log(result, entries); 
    let firstEntry = paramsFromURL.entries().next().value; 

    if (firstEntry) {
        const [key, value] = firstEntry;
        //console.log("第一個參數名稱:", key);   // "id"
        //console.log("第一個參數數值:", value); // "123"
        firstKey = key;
        firstValue = value;
        if(firstKey !=='' && firstKey !=='h') {
            gKeyName = firstKey;
            if(firstValue) {
                keyInput.value = firstValue;
            } else {

            }

        }

    //console.log(firstKey); // "id"
    //const firstValue = paramsFromURL.get(firstKey);
    //console.log(firstValue); // "123"

}

// --- IndexedDB 操作邏輯 ---

function initDB() {
    return new Promise((resolve, reject) => {
        if (dbInstance) {
            resolve(dbInstance);
            return;
        }
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = (event) => {
            const db = event.target.result;
            if (!db.objectStoreNames.contains(STORE_NAME)) {
                db.createObjectStore(STORE_NAME, { keyPath: "id" });
            }
        };
        request.onsuccess = (event) => {
            dbInstance = event.target.result;
            resolve(dbInstance);
        };
        request.onerror = (event) => {
            console.error("IndexedDB error:", event.target.errorCode);
            reject("資料庫開啟失敗");
        };
    });
}

async function saveDataToDB(content) {
    try {
        const db = await initDB();
        const transaction = db.transaction([STORE_NAME], "readwrite");
        const store = transaction.objectStore(STORE_NAME);
        const keyName = getDynamicKeyName();
        const request = store.put({ id: keyName, content: content, timestamp: new Date() });
        request.onsuccess = () => updateStatus(`已存入 ${keyName}`, 'success');
        request.onerror = (e) => updateStatus("儲存失敗: " + e.target.error, 'error');
    } catch (err) { updateStatus("DB 錯誤: " + err, 'error'); }
}

async function readDataFromDB() {
    try {
        const db = await initDB();
        const transaction = db.transaction([STORE_NAME], "readonly");
        const store = transaction.objectStore(STORE_NAME);
        const keyName = getDynamicKeyName();
        const request = store.get(keyName);
        encryptedContentArea.value = "";
        //console.log("從 DB 讀取內容...", keyName);

        // --- 核心修改：回傳並等待一個 Promise ---
        return new Promise((resolve, reject) => {
            request.onsuccess = (event) => {
                const result = event.target.result;
                if (result && result.content) {
                    encryptedContentArea.value = result.content;
                    updateStatus(`已讀取 ${keyName}`, 'success');
                    //console.log("讀取內容:", encryptedContentArea.value);
                    resolve(result.content); // 成功讀取，通知外部已完成
                } else {
                    updateStatus(`DB 中找不到 [${keyName}] 的資料`, 'error');
                    //resolve(null); // 找不到資料也算完成任務，但結果為 null
                    reject("NoBookInDB");
                }
            };

            request.onerror = (e) => {
                const errorMsg = "讀取失敗: " + e.target.error;
                updateStatus(errorMsg, 'error');
                reject(errorMsg); // 發生錯誤，通知外部失敗
            };
        });
        // ---------------------------------------

    } catch (err) {
        updateStatus("DB 錯誤: " + err, 'error');
        throw err; // 丟出錯誤讓外部 catch
    }
}

// --- 子分頁切換與編輯邏輯 ---
function switchSubTab(blockId, enterEditMode = false) {
    document.querySelectorAll('.sub-tab-button').forEach(btn => btn.classList.remove('active'));
    const targetBtn = document.getElementById('sub-btn-' + blockId);
    if (targetBtn) targetBtn.classList.add('active');

    document.querySelectorAll('.sub-tab-content').forEach(content => content.classList.remove('active'));
    const targetContent = document.getElementById('sub-content-' + blockId);
    if (targetContent) {
        targetContent.classList.add('active');
        const nameInput = targetContent.querySelector('.block-name');
        if (enterEditMode) {
            nameInput.style.display = 'block';
            nameInput.focus();
        } else {
            nameInput.style.display = 'none';
        }
    }
}

function handleSubTabClick(blockId) {
    const btn = document.getElementById('sub-btn-' + blockId);
    if (btn && btn.classList.contains('active')) {
        switchSubTab(blockId, true);
    } else {
        switchSubTab(blockId, false);
    }
}

function deleteSubTab(event, blockId) {
    event.stopPropagation();
    if (!confirm("確定要刪除這個分頁嗎？")) return;

    const btn = document.getElementById(`sub-btn-${blockId}`);
    const content = document.getElementById(`sub-content-${blockId}`);
    const wasActive = btn.classList.contains('active');

    btn.remove();
    content.remove();

    if (wasActive) {
        const remainingBtns = document.querySelectorAll('.sub-tab-button');
        if (remainingBtns.length > 0) {
            const lastBtnId = remainingBtns[remainingBtns.length - 1].id.replace('sub-btn-', '');
            switchSubTab(lastBtnId);
        }
    }
    updateStatus("分頁已刪除", "info");
}

function addEditableBlock(title = null, content = "") {
    blockCounter++;
    const currentId = blockCounter;
    const blockIdString = `block-${currentId}`;
    const displayTitle = title || (currentId === 1 ? "封面" : `${currentId}`);

    const newBtn = document.createElement('button');
    newBtn.id = `sub-btn-${blockIdString}`;
    newBtn.className = 'sub-tab-button';
    newBtn.innerHTML = `
        <span class="btn-text">${displayTitle}</span>
        <span class="delete-sub-btn" title="刪除分頁">×</span>
    `;
    newBtn.onclick = () => handleSubTabClick(blockIdString);
    
    const delBtn = newBtn.querySelector('.delete-sub-btn');
    delBtn.onclick = (e) => deleteSubTab(e, blockIdString);
    
    subTabNav.appendChild(newBtn);

    const newContentDiv = document.createElement('div');
    newContentDiv.id = `sub-content-${blockIdString}`;
    newContentDiv.className = 'sub-tab-content';
    newContentDiv.innerHTML = `
        <input type="text" class="block-name" value="${displayTitle}" data-target-btn="sub-btn-${blockIdString}">
        <textarea class="editable-text" placeholder="在此輸入筆記...">${content}</textarea>
    `;
    subTabContentContainer.appendChild(newContentDiv);

    const nameInput = newContentDiv.querySelector('.block-name');
    nameInput.addEventListener('input', function() {
        const btnId = this.getAttribute('data-target-btn');
        const btn = document.getElementById(btnId);
        if (btn) {
            const textSpan = btn.querySelector('.btn-text');
            if (textSpan) textSpan.textContent = this.value;
        }
    });

    nameInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            this.blur();
        }
    });

    nameInput.addEventListener('blur', function() {
        this.style.display = 'none';
        const parent = this.closest('.sub-tab-content');
        if (parent) {
             const area = parent.querySelector('.editable-text');
             if(area) area.focus();
        }
    });

    switchSubTab(blockIdString, false);
}

// --- 加密/解密 核心邏輯 (SHA512 + AES) ---
// new one to fit with vp, support multiple blocks with structure
function getContentFromTabB() {
    const contents = [];
    const blocks = document.querySelectorAll('.sub-tab-content');
    blocks.forEach(block => {
        const nameInput = block.querySelector('.block-name');
        const textarea = block.querySelector('.editable-text');
        const title = nameInput.value || "_";
        const text = textarea.value || "";
        const safeTitle = btoa(unescape(encodeURIComponent(title))); 
        const safeText = btoa(unescape(encodeURIComponent(text)));
        const struct = `<<<<BLOCK_START_v2>>>>\n${safeTitle}\n<<<<TITLE_END>>>>\n${safeText}\n<<<<BLOCK_END>>>>`;
        contents.push(struct);
    });
    //console.log(`從分頁 B 取得內容，總長度: ${contents.join('\n').length}, 區塊數: ${contents.length}, 預覽: ${contents.join('\n').substring(0, 100)}`);
    return contents.join('\n');
}

function setContentToTabB(fullContent) {
    subTabNav.innerHTML = '';
    subTabContentContainer.innerHTML = '';
    blockCounter = 0;

    let parseType = "v2";
    let blockStrings = fullContent.split('<<<<BLOCK_START_v2>>>>').filter(s => s.trim() !== "");
    //console.log("使用新版解析方式...",blockStrings);
    //console.log("org length:", fullContent.length, "blocks found:", blockStrings.length);
    //console.log(`blockStrings length: ${blockStrings.length}, content preview: ${fullContent.substring(0, 999999)}, blockStrings[0].indexOf('<<<<TITLE_END>>>>'): ${blockStrings.length > 0 ? blockStrings[0].indexOf('<<<<TITLE_END>>>>') : 'N/A'}`); 

    if (blockStrings.length === 0 || blockStrings[0].indexOf('<<<<TITLE_END>>>>') === -1) {   
        console.log("使用舊版解析方式...");
        const blockStrings2 = fullContent.split('<<<<BLOCK_START>>>>').filter(s => s.trim() !== "");
        console.log("org length:", fullContent.length, "blocks found:", blockStrings2.length);
        if (blockStrings2.length === 0) {
            console.log("解密內容", fullContent);
            return;
        }
        parseType = "v1";
        blockStrings = blockStrings2;
    }


    //console.log(`parseType: ${parseType}, blocks to process: ${blockStrings.length}`);

    blockStrings.forEach(blockStr => {
        const regex = new RegExp(`(.*?)\n<<<<TITLE_END>>>>\n(.*?)<<<<BLOCK_END>>>>`, 's');
        const match = blockStr.match(regex);
        //console.log(`parseType: ${parseType}, processing block, regex match: ${match !== null}, block length: ${blockStr.length}`);
        if (match) {
            const safeTitle = match[1].trim();
            const title = parseType === "v2" ? decodeURIComponent(escape(atob(safeTitle))) : safeTitle;
            const safeText = match[2].trim();
            const text = parseType === "v2" ? decodeURIComponent(escape(atob(safeText))) : safeText;
            addEditableBlock(title, text);
        } else {
            addEditableBlock("解析錯誤", blockStr);
        }
    });

    if (blockCounter > 0) {
        const firstId = document.querySelector('.sub-tab-button').id.replace('sub-btn-', '');
        switchSubTab(firstId, false);
    }
}

// 按鈕事件 - 加密
function encData(){
    const key = getKey();
    encryptedContentArea.value = "";
    const content = getContentFromTabB();
    if (!key || key.trim() === "") { alert("請輸入密鑰", 'error'); return false; }
    if (!content.trim()) { updateStatus("筆記無內容", 'error'); return false; }
    try {
        const keyHash = CryptoJS.SHA512(key).toString();
        const encrypted = CryptoJS.AES.encrypt(content, keyHash).toString();
        encryptedContentArea.value = encrypted;
        updateStatus("加密成功！", 'success');
    } catch (e) { updateStatus("加密失敗: " + e.message, 'error'); return false;}
    return true;
}

// 按鈕事件 - 解密
function decData(){
    const key = getKey();
    const encryptedText = encryptedContentArea.value;
    //console.log("取得密文內容...",encryptedText,encryptedContentArea.value);
    if (!key || key.trim() === "") { alert("請輸入密鑰", 'error'); return false; }
    //console.log("開始解密...",encryptedText);
    if (!encryptedText) { updateStatus("無密文內容", 'error'); return; }
    //console.log("有密文內容，進行解密...",encryptedText);
    try {
        const keyHash = CryptoJS.SHA512(key).toString();
        const bytes = CryptoJS.AES.decrypt(encryptedText, keyHash);
        const originalText = bytes.toString(CryptoJS.enc.Utf8);
        if (originalText) {
            //console.log("解密成功，載入內容至筆記分頁...");
            setContentToTabB(originalText);
            openTab({currentTarget: document.querySelectorAll('.tab-button')[0]}, 'TabB');
            updateStatus("解密成功！", 'success');

const rendererHrefCheck = {
  link(token) {
    const isNewVersion = typeof token === 'object';
    const href = isNewVersion ? token.href : arguments[0];

    if (href && href.startsWith('#')) {
      const title = isNewVersion ? token.title : arguments[1];
      const text = isNewVersion ? token.text : arguments[2];
      const titleAttr = title ? ` title="${title}"` : '';
      return `<a href="${href}" target="_self"${titleAttr}>${text}</a>`;
    }
    return false; 
  }
};

  // 抓取 content 區塊內所有的標題 (h1 ~ h6)
  //const headings = contentDiv.querySelectorAll('h1, h2, h3, h4, h5, h6');
  
  // 改成可以設定h1 -> h6 的範圍，用進來時的網址，如 https://url.com/?bookname=passwd&h=3 , 這時，就可以呈現 h1 到 h3 , 預設是 h1.   const params = new URLSearchParams(window.location.search);

  let selector = '';
  for (let i = 1; i <= maxLevel; i++) {
    selector += (selector ? ',' : '') + 'h' + i;
  }
  const headings = contentDiv.querySelectorAll(selector);

  
  // const headings = contentDiv.querySelectorAll('h1');
  
  if (headings.length === 0) return;
// 改用一個簡單的容器包覆，加上 line-height 確保字體大小不同時換行不擁擠
  let tocHTML = '<div style="line-height: 2; word-break: break-word;">';

    tocHTML += `<div style="
            font-size: 20px; 
            margin-right: 12px; 
            text-decoration: none; 
            color: #0056b3;
            display: inline-block;
            "><span style="cursor: pointer;" onclick="gotoTop();">Top</span></div>
            
            <div style="
                font-size: 25px; 
                color: #0056b3;
                display: flex; 
                justify-content: space-between; /* 讓裡面的元素自動靠左右兩側對齊 */
                width: 180px; /* ⚠️ 必須要有寬度，空間才夠把 + 和 - 拉開 (請依你的需求調整數字) */
                user-select: none;
            ">
                <span style="cursor: pointer;" onclick="incLevel();">+</span>
                <span style="cursor: pointer;" onclick="decLevel();">-</span>
            </div>`;

  headings.forEach(heading => {
    const id = heading.id; 
    const originalText = heading.textContent;
    const level = parseInt(heading.tagName.replace('H', '')); 
    
    // 【重點修改】判斷字數，超過 10 個字就取前 10 個字並加上 '...'
// 1. 檢查字串是否包含中文字 (Unicode 範圍)
    const hasChinese = /[\u4e00-\u9fa5]/.test(originalText);
    
    // 2. 根據是否有中文，決定截斷的字數上限
    const limit = hasChinese ? 15 : 22;

    // 3. 套用限制 (這裡幫你加上 ... 讓視覺更清楚，如果你只要一個 . 可以自行改回)
    const displayText = originalText.length > limit 
      ? originalText.substring(0, limit) + '..' 
      : originalText;

    // 【重點修改】計算字體大小
    // 假設基準為 24px (H1)，每降一級減 3px
    // H1=24px, H2=21px, H3=18px, H4=15px, H5=12px, H6=9px
    const fontSize = 16 - (level - 1) * 1; 

    // 直接生成帶有樣式的 <a> 標籤，並用 margin-right 稍微隔開每個標題
    // 若是level 1 - 6, 就在名字前加上空格 0-5 個
        const indent = "&nbsp;".repeat((level - 1) * 2);
    
    tocHTML += `<a href="#${id}" 
         target="_self"
         style="
           font-size: ${fontSize}px; 
           margin-right: 3px; 
           text-decoration: none; 
           color: #0056b3;
           display: inline-block;
         "
      >${indent}${displayText}</a><br>`;
  });

  tocHTML += '</div>';
  
  // 將生成的目錄渲染到畫面上
  tocDiv.innerHTML = tocHTML;
}
