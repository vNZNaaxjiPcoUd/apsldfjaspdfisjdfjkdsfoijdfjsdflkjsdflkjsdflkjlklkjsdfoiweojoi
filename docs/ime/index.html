<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>倉頡輸入</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Noto+Sans+TC:wght@400;700&display=swap');

        html, body {
            /* 【手機版優化】使用 dvh 動態視窗高度，避免被 Safari 底部工具列遮擋 */
            height: 100dvh;
            margin: 0;
            padding: 0;
            overflow: hidden; /* 防止整體頁面不必要的滑動 */
        }
        
        body {
            font-family: 'Nunito', 'Noto Sans TC', sans-serif;
            padding: 20px;
            box-sizing: border-box;
            background-color: #f0f8f1; 
            color: #333;
        }

        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(134, 184, 142, 0.15);
            max-width: 1080px;
            height: 100%; 
            margin: auto;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }
        
        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        h2 {
            margin: 0;
            color: #2e7d32;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        h2::before {
            content: '🌱';
            font-size: 24px;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #mode-toggle {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 50px; 
            background-color: #a5d6a7;
            color: #1b5e20;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(165, 214, 167, 0.4);
            font-family: inherit;
        }
        
        #mode-toggle:hover {
            background-color: #81c784;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(129, 199, 132, 0.5);
        }

        .header-controls a {
            color: #66bb6a;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            transition: color 0.3s;
        }

        #cj-status {
            margin-top: 15px;
            font-size: 18px;
            color: #555;
            height: 28px; 
            font-weight: bold;
        }
        
        #current-code {
            font-weight: 900;
            color: #ff8a65;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        #candidates {
            margin-top: 15px;
            margin-bottom: 15px;
            font-size: 20px;
            height: 60px; 
            white-space: nowrap; 
            overflow-x: auto;    
            overflow-y: hidden;  
            /* 【手機版優化】讓橫向滑動更順暢，有原生 App 的慣性滑動感 */
            -webkit-overflow-scrolling: touch; 
            scrollbar-width: thin;
            scrollbar-color: #a5d6a7 transparent;
            padding-bottom: 10px;
            display: flex;
            align-items: center;
        }
        
        #candidates::-webkit-scrollbar {
            height: 6px;
        }
        #candidates::-webkit-scrollbar-track {
            background: transparent;
        }
        #candidates::-webkit-scrollbar-thumb {
            background-color: #a5d6a7;
            border-radius: 10px;
        }

        .candidate {
            margin-right: 12px;
            cursor: pointer;
            /* 【手機版優化】增加 Padding，讓手指更好點擊 (Fat-finger friendly) */
            padding: 10px 18px; 
            border: 2px solid transparent;
            border-radius: 16px;
            display: inline-block;
            background-color: #e8f5e9;
            color: #2e7d32;
            font-weight: bold;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            /* 防止選取文字干擾點擊 */
            user-select: none;
            -webkit-user-select: none;
        }

        /* 手機上取消 hover 放大，改用 active 按壓回饋 */
        @media (hover: hover) {
            .candidate:hover {
                background-color: #c8e6c9;
                border-color: #a5d6a7;
                transform: scale(1.08);
            }
        }
        .candidate:active {
            transform: scale(0.95);
            background-color: #a5d6a7;
        }
        
        label {
            margin-top: 5px;
            margin-bottom: 8px;
            font-weight: bold;
            color: #66bb6a;
            font-size: 14px;
        }
        
        textarea {
            width: 100%;
            flex-grow: 1; 
            resize: none;
            border: 2px solid #c8e6c9;
            border-radius: 20px;
            outline: none;
            padding: 15px;
            /* 【手機版優化】iOS Safari 如果 input/textarea 字體小於 16px，點擊時會自動放大畫面 */
            font-size: 16px; 
            font-family: inherit;
            line-height: 1.6;
            box-sizing: border-box;
            background-color: #fafafa;
            transition: all 0.3s ease;
        }
        
        textarea:focus {
            border-color: #81c784;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(129, 199, 132, 0.2);
        }

        /* --- 手機版 RWD 響應式排版調整 --- */
        @media (max-width: 600px) {
            body {
                padding: 10px; /* 縮小螢幕邊緣留白 */
            }
            .container {
                padding: 15px; /* 縮小內部留白給輸入區更多空間 */
                border-radius: 18px;
            }
            .header-controls {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .header-right {
                width: 100%;
                justify-content: space-between;
            }
            h2 {
                font-size: 20px;
            }
            #mode-toggle {
                padding: 8px 16px;
                font-size: 14px;
            }
            #candidates {
                height: 70px; /* 給予觸控跟捲動更多空間 */
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-controls">
        <h2>倉頡輸入</h2>
        <div class="header-right">
            <button id="mode-toggle">目前模式：中文</button>
            <a href="https://www.google.com/inputtools/try/" target="_blank">GoogleIME ↗</a>
        </div>
    </div>
    
    <script src="cangjie_dict.js"></script>
    
    <div id="cj-status">目前拼碼：<span id="current-code"></span></div>
    <div id="candidates"></div>
    <label>✨ 請在此輸入 (手機點擊虛擬鍵盤)：</label>
    
    <textarea id="input-box" 
              placeholder="點擊此處開始輸入..." 
              autocapitalize="none" 
              autocorrect="off" 
              autocomplete="off" 
              spellcheck="false"></textarea>
</div>

<script>
    const inputBox = document.getElementById('input-box');
    const candidatesDiv = document.getElementById('candidates');
    const currentCodeSpan = document.getElementById('current-code');
    const modeToggleBtn = document.getElementById('mode-toggle');
    
    let currentCode = '';
    let isChineseMode = true;

    function toggleMode() {
        isChineseMode = !isChineseMode;
        modeToggleBtn.textContent = isChineseMode ? '目前模式：中文' : '目前模式：英文';
        
        if(isChineseMode) {
            modeToggleBtn.style.backgroundColor = '#a5d6a7';
            modeToggleBtn.style.color = '#1b5e20';
        } else {
            modeToggleBtn.style.backgroundColor = '#e0e0e0';
            modeToggleBtn.style.color = '#555555';
        }
        
        currentCode = '';
        updateUI();
        inputBox.focus(); 
    }

    modeToggleBtn.addEventListener('click', toggleMode);

    inputBox.addEventListener('keydown', function(e) {
        if (e.ctrlKey && e.key === ' ') {
            e.preventDefault(); 
            toggleMode();
            return; 
        }

        if (!isChineseMode) return;

        if (e.key >= 'a' && e.key <= 'z' && !e.ctrlKey && !e.altKey && !e.metaKey) {
            e.preventDefault(); 
            currentCode += e.key;
            updateUI();
        } 
        else if (e.key === 'Backspace' && currentCode.length > 0) {
            e.preventDefault();
            currentCode = currentCode.slice(0, -1);
            updateUI();
        } 
        else if (e.key === ' ' && currentCode.length > 0) {
            e.preventDefault();
            if (typeof cangjieDict !== 'undefined') {
                const chars = cangjieDict[currentCode];
                if (chars && chars.length > 0) {
                    commitChar(chars[0]);
                }
            }
        }
        else if (e.key >= '1' && e.key <= '9' && currentCode.length > 0) {
            if (typeof cangjieDict !== 'undefined') {
                const index = parseInt(e.key) - 1;
                const chars = cangjieDict[currentCode];
                if (chars && chars[index]) {
                    e.preventDefault();
                    commitChar(chars[index]);
                }
            }
        }
    });

    function updateUI() {
        currentCodeSpan.textContent = currentCode;
        candidatesDiv.innerHTML = '';
        
        if (currentCode === '') return;

        if (typeof cangjieDict !== 'undefined') {
            const chars = cangjieDict[currentCode];
            if (chars) {
                chars.forEach((char, index) => {
                    const span = document.createElement('span');
                    span.className = 'candidate';
                    span.textContent = `${index + 1}. ${char}`;
                    
                    // 【手機版優化】使用 pointerdown 可讓觸控反應比 click 更快上屏
                    span.addEventListener('pointerdown', (e) => {
                        e.preventDefault(); // 防止失去焦點收起鍵盤
                        commitChar(char);
                    });
                    
                    candidatesDiv.appendChild(span);
                });
            } else {
                candidatesDiv.innerHTML = '<span style="color: #9e9e9e; font-size: 16px; padding: 10px;">無符合字詞 💧</span>';
            }
        } else {
             candidatesDiv.innerHTML = '<span style="color: #e57373; font-size: 16px; padding: 10px;">字典檔尚未載入 ⚠️</span>';
        }
    }

    function commitChar(char) {
        const start = inputBox.selectionStart;
        const end = inputBox.selectionEnd;
        const text = inputBox.value;
        
        inputBox.value = text.slice(0, start) + char + text.slice(end);
        inputBox.selectionStart = inputBox.selectionEnd = start + char.length;
        
        currentCode = ''; 
        updateUI();
        // 確保上屏後游標依然在輸入框內，不會讓手機鍵盤收起來
        inputBox.focus();
    }
</script>

</body>
</html>
