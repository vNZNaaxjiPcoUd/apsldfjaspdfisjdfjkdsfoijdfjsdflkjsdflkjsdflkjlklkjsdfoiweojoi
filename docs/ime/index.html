<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>倉頡輸入</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Noto+Sans+TC:wght@400;700&display=swap');

        html, body {
            height: 100dvh;
            margin: 0;
            padding: 0;
            overflow: hidden; 
        }
        
        body {
            font-family: 'Nunito', 'Noto Sans TC', sans-serif;
            padding: 20px;
            box-sizing: border-box;
            background-color: #121212; 
            color: #e0e0e0; 
        }

        .container {
            background: #1e1e1e; 
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); 
            max-width: 1080px;
            height: 100%; 
            margin: auto;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            border: 1px solid #2e7d32; 
        }
        
        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        h2 {
            margin: 0;
            color: #81c784; 
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        h2::before {
            content: '🌱';
            font-size: 24px;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* 整合按鈕共用樣式 */
        .btn-common {
            padding: 8px 16px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 50px; 
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-common:hover {
            transform: translateY(-2px);
        }

        /* 個別按鈕顏色設定 */
        #save-btn {
            background-color: #43a047; 
            color: #fff3e0;
            box-shadow: 0 4px 10px rgba(113, 255, 78, 0.3);
        }
        #save-btn:hover { background-color: #43a047;  box-shadow: 0 6px 15px rgba(92, 255, 64, 0.4); }

        #load-btn {
            background-color: #43a047; 
            color: #e3f2fd;
            box-shadow: 0 4px 10px rgba(47, 210, 25, 0.3);
        }
        #load-btn:hover { background-color: #43a047; box-shadow: 0 6px 15px rgba(25, 210, 28, 0.4); }

        #copy-btn {
            background-color: #43a047; 
            color: #e1f5fe; 
            box-shadow: 0 4px 10px rgba(67, 160, 71, 0.3);
        }
        #copy-btn:hover { background-color: #36813a; box-shadow: 0 6px 15px rgba(67, 160, 71, 0.4); }

        #mode-toggle {
            background-color: #2e7d32; 
            color: #e8f5e9; 
            box-shadow: 0 4px 10px rgba(46, 125, 50, 0.3);
        }
        #mode-toggle:hover { background-color: #388e3c; box-shadow: 0 6px 15px rgba(56, 142, 60, 0.4); }

        .header-controls a {
            color: #81c784; 
            text-decoration: none;
            font-weight: bold;
            font-size: 12px;
            transition: color 0.3s;
            margin-left: 4px;
        }
        .header-controls a:hover {
            color: #a5d6a7;
        }

        #cj-status {
            margin-top: 0px;
            font-size: 18px;
            color: #b0bec5; 
            height: 25px; 
            font-weight: bold;
        }
        
        #current-code {
            font-weight: 900;
            color: #ffab91; 
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        #candidates {
            margin-top: 15px;
            margin-bottom: 15px;
            font-size: 20px;
            height: 60px; 
            white-space: nowrap; 
            overflow-x: auto;    
            overflow-y: hidden;  
            -webkit-overflow-scrolling: touch; 
            scrollbar-width: thin;
            scrollbar-color: #2e7d32 transparent;
            padding-bottom: 10px;
            display: flex;
            align-items: center;
        }
        
        #candidates::-webkit-scrollbar {
            height: 6px;
        }
        #candidates::-webkit-scrollbar-track {
            background: transparent;
        }
        #candidates::-webkit-scrollbar-thumb {
            background-color: #2e7d32;
            border-radius: 10px;
        }

        .candidate {
            margin-right: 12px;
            cursor: pointer;
            padding: 10px 18px; 
            border: 2px solid transparent;
            border-radius: 16px;
            display: inline-block;
            background-color: #263238; 
            color: #a5d6a7; 
            font-weight: bold;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
            -webkit-user-select: none;
        }

        @media (hover: hover) {
            .candidate:hover {
                background-color: #37474f;
                border-color: #4caf50; 
                transform: scale(1.08);
            }
        }
        .candidate:active {
            transform: scale(0.95);
            background-color: #4caf50;
            color: #121212;
        }
        
        textarea {
            width: 100%;
            flex-grow: 1; 
            resize: none;
            border: 2px solid #2e7d32; 
            border-radius: 20px;
            outline: none;
            padding: 15px;
            font-size: 16px; 
            font-family: inherit;
            line-height: 1.6;
            box-sizing: border-box;
            background-color: #151515; 
            color: #e0e0e0; 
            transition: all 0.3s ease;
        }
        
        textarea:focus {
            border-color: #81c784; 
            background-color: #1a1a1a;
            box-shadow: 0 0 0 4px rgba(129, 199, 132, 0.15);
        }

        @media (max-width: 600px) {
            body { padding: 1px; }
            .container { padding: 1px; border-radius: 3px; }
            .header-controls { gap: 2px; margin-bottom: 0px; font-size: 12px; }
            h2 { font-size: 20px; }
            .btn-common { padding: 4px 10px; font-size: 12px; }
            #candidates { height: 18px; margin-top: 1px; margin-bottom: 1px; font-size: 12px; padding-bottom: 0px; overflow-x: hidden; }
            .candidate { margin-right: 0px; padding: 0px 0px; border: 1px solid transparent; border-radius: 2px; }          
            #cj-status { margin-top: 0px; font-size: 12px; color: #b0bec5; height: 13px; font-weight: normal; }  
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-controls">
        <div id="cj-status">輸入：<span id="current-code"></span></div>
        <div class="header-right">
            <button id="save-btn" class="btn-common" title="加密並儲存內容至瀏覽器">存</button>
            <button id="load-btn" class="btn-common" title="從瀏覽器讀取並解密內容">讀</button>
            <button id="copy-btn" class="btn-common" title="複製內容">複製</button>
            <button id="mode-toggle" class="btn-common" title="ctrl + L">倉頡</button>
            <a href="pinyin.html"  target="_blank">拼音↗</a>
        </div>
    </div>
    <div id="candidates"></div>    
    <textarea id="input-box" 
              placeholder="點擊此處開始輸入..." 
              autocapitalize="none" 
              autocorrect="off" 
              autocomplete="off" 
              spellcheck="false"></textarea>
</div>

<script src="cangjie_dict.js"></script>
<script src="cj.obf.js"></script>


</body>
</html>
