<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>倉頡輸入</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Noto+Sans+TC:wght@400;700&display=swap');

        html, body {
            height: 100dvh;
            margin: 0;
            padding: 0;
            overflow: hidden; 
        }
        
        body {
            font-family: 'Nunito', 'Noto Sans TC', sans-serif;
            padding: 20px;
            box-sizing: border-box;
            background-color: #121212; 
            color: #e0e0e0; 
        }

        .container {
            background: #1e1e1e; 
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); 
            max-width: 1080px;
            height: 100%; 
            margin: auto;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            border: 1px solid #2e7d32; 
        }
        
        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        h2 {
            margin: 0;
            color: #81c784; 
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        h2::before {
            content: '🌱';
            font-size: 24px;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* 整合按鈕共用樣式 */
        .btn-common {
            padding: 8px 16px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 50px; 
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-common:hover {
            transform: translateY(-2px);
        }

        /* 個別按鈕顏色設定 */
        #save-btn {
            background-color: #43a047; 
            color: #fff3e0;
            box-shadow: 0 4px 10px rgba(113, 255, 78, 0.3);
        }
        #save-btn:hover { background-color: #43a047;  box-shadow: 0 6px 15px rgba(92, 255, 64, 0.4); }

        #load-btn {
            background-color: #43a047; 
            color: #e3f2fd;
            box-shadow: 0 4px 10px rgba(47, 210, 25, 0.3);
        }
        #load-btn:hover { background-color: #43a047; box-shadow: 0 6px 15px rgba(25, 210, 28, 0.4); }

        #copy-btn {
            background-color: #43a047; 
            color: #e1f5fe; 
            box-shadow: 0 4px 10px rgba(67, 160, 71, 0.3);
        }
        #copy-btn:hover { background-color: #36813a; box-shadow: 0 6px 15px rgba(67, 160, 71, 0.4); }

        #mode-toggle {
            background-color: #2e7d32; 
            color: #e8f5e9; 
            box-shadow: 0 4px 10px rgba(46, 125, 50, 0.3);
        }
        #mode-toggle:hover { background-color: #388e3c; box-shadow: 0 6px 15px rgba(56, 142, 60, 0.4); }

        .header-controls a {
            color: #81c784; 
            text-decoration: none;
            font-weight: bold;
            font-size: 12px;
            transition: color 0.3s;
            margin-left: 4px;
        }
        .header-controls a:hover {
            color: #a5d6a7;
        }

        #cj-status {
            margin-top: 0px;
            font-size: 18px;
            color: #b0bec5; 
            height: 25px; 
            font-weight: bold;
        }
        
        #current-code {
            font-weight: 900;
            color: #ffab91; 
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        #candidates {
            margin-top: 15px;
            margin-bottom: 15px;
            font-size: 20px;
            height: 60px; 
            white-space: nowrap; 
            overflow-x: auto;    
            overflow-y: hidden;  
            -webkit-overflow-scrolling: touch; 
            scrollbar-width: thin;
            scrollbar-color: #2e7d32 transparent;
            padding-bottom: 10px;
            display: flex;
            align-items: center;
        }
        
        #candidates::-webkit-scrollbar {
            height: 6px;
        }
        #candidates::-webkit-scrollbar-track {
            background: transparent;
        }
        #candidates::-webkit-scrollbar-thumb {
            background-color: #2e7d32;
            border-radius: 10px;
        }

        .candidate {
            margin-right: 12px;
            cursor: pointer;
            padding: 10px 18px; 
            border: 2px solid transparent;
            border-radius: 16px;
            display: inline-block;
            background-color: #263238; 
            color: #a5d6a7; 
            font-weight: bold;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
            -webkit-user-select: none;
        }

        @media (hover: hover) {
            .candidate:hover {
                background-color: #37474f;
                border-color: #4caf50; 
                transform: scale(1.08);
            }
        }
        .candidate:active {
            transform: scale(0.95);
            background-color: #4caf50;
            color: #121212;
        }
        
        textarea {
            width: 100%;
            flex-grow: 1; 
            resize: none;
            border: 2px solid #2e7d32; 
            border-radius: 20px;
            outline: none;
            padding: 15px;
            font-size: 16px; 
            font-family: inherit;
            line-height: 1.6;
            box-sizing: border-box;
            background-color: #151515; 
            color: #e0e0e0; 
            transition: all 0.3s ease;
        }
        
        textarea:focus {
            border-color: #81c784; 
            background-color: #1a1a1a;
            box-shadow: 0 0 0 4px rgba(129, 199, 132, 0.15);
        }

        @media (max-width: 600px) {
            body { padding: 1px; }
            .container { padding: 1px; border-radius: 3px; }
            .header-controls { gap: 2px; margin-bottom: 0px; font-size: 12px; }
            h2 { font-size: 20px; }
            .btn-common { padding: 4px 10px; font-size: 12px; }
            #candidates { height: 18px; margin-top: 1px; margin-bottom: 1px; font-size: 12px; padding-bottom: 0px; overflow-x: hidden; }
            .candidate { margin-right: 0px; padding: 0px 0px; border: 1px solid transparent; border-radius: 2px; }          
            #cj-status { margin-top: 0px; font-size: 12px; color: #b0bec5; height: 13px; font-weight: normal; }  
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-controls">
        <div id="cj-status">輸入：<span id="current-code"></span></div>
        <div class="header-right">
            <button id="save-btn" class="btn-common" title="加密並儲存內容至瀏覽器">存</button>
            <button id="load-btn" class="btn-common" title="從瀏覽器讀取並解密內容">讀</button>
            <button id="copy-btn" class="btn-common" title="複製內容">複製</button>
            <button id="mode-toggle" class="btn-common" title="ctrl + L">倉頡</button>
            <a href="pinyin.html">拼音↗</a>
        </div>
    </div>
    <div id="candidates"></div>    
    <textarea id="input-box" 
              placeholder="點擊此處開始輸入..." 
              autocapitalize="none" 
              autocorrect="off" 
              autocomplete="off" 
              spellcheck="false"></textarea>
</div>

<script src="cangjie_dict.js"></script>
<script>
    const inputBox = document.getElementById('input-box');
    const candidatesDiv = document.getElementById('candidates');
    const currentCodeSpan = document.getElementById('current-code');
    const modeToggleBtn = document.getElementById('mode-toggle');
    const copyBtn = document.getElementById('copy-btn'); 
    const saveBtn = document.getElementById('save-btn');
    const loadBtn = document.getElementById('load-btn');
    const SECRET_KEY = "d2c374dc6ea70a3876207c4655e33be1c4397c2cacad3d98a22b";

    let currentCode = '';
    let isChineseMode = true;

    const cangjieRadicals = {
        'a': '日', 'b': '月', 'c': '金', 'd': '木', 'e': '水', 'f': '火', 'g': '土', 
        'h': '竹', 'i': '戈', 'j': '十', 'k': '大', 'l': '中', 'm': '一', 'n': '弓', 
        'o': '人', 'p': '心', 'q': '手', 'r': '口', 's': '尸', 't': '廿', 'u': '山', 
        'v': '女', 'w': '田', 'x': '難', 'y': '卜', 'z': '重'
    };

    const punctuationMap = {
        ',': '，', '.': '。', '?': '？', ';': '；', ' ': ' ', 
        '!':'！', '(':'（', ')':'）',
    };

    copyBtn.addEventListener('click', async () => {
        try {
            await navigator.clipboard.writeText(inputBox.value);
            copyBtn.textContent = '已複製';
            setTimeout(() => copyBtn.textContent = '複製', 1500);
        } catch (err) {
            console.error('複製失敗:', err);
            copyBtn.textContent = '失敗';
            setTimeout(() => copyBtn.textContent = '複製', 1500);
        }
        inputBox.focus(); 
    });

    function toggleMode() {
        isChineseMode = !isChineseMode;
        modeToggleBtn.textContent = isChineseMode ? '倉頡' : '英文';
        
        if(isChineseMode) {
            modeToggleBtn.style.backgroundColor = '#2e7d32';
            modeToggleBtn.style.color = '#e8f5e9';
        } else {
            modeToggleBtn.style.backgroundColor = '#424242';
            modeToggleBtn.style.color = '#bdbdbd';
        }
        
        currentCode = '';
        updateUI();
        inputBox.focus(); 
    }

    modeToggleBtn.addEventListener('click', toggleMode);

    function getCandidates(code) {
        if (typeof cangjieDict === 'undefined' || !code) return [];
        const resultSet = new Set();
        
        if (cangjieDict[code]) {
            cangjieDict[code].forEach(char => resultSet.add(char));
        }
        
        for (const key in cangjieDict) {
            if (key !== code && key.startsWith(code)) {
                cangjieDict[key].forEach(char => resultSet.add(char));
            }
        }
        return Array.from(resultSet);
    }

    inputBox.addEventListener('keydown', function(e) {
        if ((e.ctrlKey && e.key === ' ') || (e.ctrlKey && e.key.toLowerCase() === 'l')){
            e.preventDefault(); 
            toggleMode();
            return; 
        }

        if (!isChineseMode) return;

        if (e.key >= 'a' && e.key <= 'z' && !e.ctrlKey && !e.altKey && !e.metaKey) {
            e.preventDefault(); 
            currentCode += e.key;
            updateUI();
            return;
        } 
        
        if (e.key === 'Backspace' && currentCode.length > 0) {
            e.preventDefault();
            currentCode = currentCode.slice(0, -1);
            updateUI();
            return;
        } 
        
        if (punctuationMap[e.key] && !e.ctrlKey && !e.altKey && !e.metaKey) {
            e.preventDefault();
            if (e.key === ' ') {
                if (currentCode.length > 0) {
                    const chars = getCandidates(currentCode);
                    if (chars.length > 0) commitChar(chars[0]);
                } else {
                    commitChar(punctuationMap[e.key]);
                }
            } else {
                if (currentCode.length > 0) {
                    const chars = getCandidates(currentCode);
                    if (chars.length > 0) {
                        commitChar(chars[0]);
                    } else {
                        currentCode = ''; 
                        updateUI();
                    }
                }
                commitChar(punctuationMap[e.key]);
            }
            return;
        }

        if (e.key >= '1' && e.key <= '9' && currentCode.length > 0) {
            const index = parseInt(e.key) - 1;
            const chars = getCandidates(currentCode);
            if (chars && chars[index]) {
                e.preventDefault();
                commitChar(chars[index]);
            }
            return;
        }
    });

    function updateUI() {
        currentCodeSpan.textContent = currentCode.split('').map(c => cangjieRadicals[c] || c).join('');
        candidatesDiv.innerHTML = '';
        
        if (currentCode === '') return;

        if (typeof cangjieDict !== 'undefined') {
            const chars = getCandidates(currentCode);
            if (chars.length > 0) {
                chars.forEach((char, index) => {
                    const span = document.createElement('span');
                    span.className = 'candidate';
                    span.textContent = `${index + 1}. ${char}`;
                    
                    span.addEventListener('pointerdown', (e) => {
                        e.preventDefault(); 
                        commitChar(char);
                    });
                    
                    candidatesDiv.appendChild(span);
                });
            } else {
                candidatesDiv.innerHTML = '<span style="color: #757575; font-size: 16px; padding: 10px;">無符合字詞 💧</span>';
            }
        } else {
             candidatesDiv.innerHTML = '<span style="color: #ef5350; font-size: 16px; padding: 10px;">字典檔尚未載入 ⚠️</span>';
        }
    }

    function commitChar(char) {
        const start = inputBox.selectionStart;
        const end = inputBox.selectionEnd;
        const text = inputBox.value;
        
        inputBox.value = text.slice(0, start) + char + text.slice(end);
        inputBox.selectionStart = inputBox.selectionEnd = start + char.length;
        
        currentCode = ''; 
        updateUI();
        inputBox.focus();
    }

    // ==========================================
    // IndexedDB 加密儲存與解密讀取功能
    // ==========================================
    const dbName = "CangjieEditorDB";
    const storeName = "editorData";
    let db;

    function initDB() {
        const request = indexedDB.open(dbName, 1);

        request.onupgradeneeded = function(event) {
            db = event.target.result;
            if (!db.objectStoreNames.contains(storeName)) {
                db.createObjectStore(storeName, { keyPath: "id" });
            }
        };

        request.onsuccess = function(event) {
            db = event.target.result;
        };

        request.onerror = function(event) {
            console.error("IndexedDB 初始化失敗:", event.target.error);
        };
    }

    function saveToIndexedDB() {
        if (!db) return;
        const transaction = db.transaction([storeName], "readwrite");
        const store = transaction.objectStore(storeName);
        
        try {
            // 使用 CryptoJS 將文字內容進行 AES 加密
            const encryptedContent = CryptoJS.AES.encrypt(inputBox.value, SECRET_KEY).toString();
            
            store.put({ id: "savedText", content: encryptedContent });
            
            transaction.oncomplete = function() {
                saveBtn.textContent = '已存';
                setTimeout(() => saveBtn.textContent = '存', 1500);
            };
            
            transaction.onerror = function(event) {
                console.error("儲存失敗:", event.target.error);
                saveBtn.textContent = '失敗';
                setTimeout(() => saveBtn.textContent = '存', 1500);
            };
        } catch (error) {
            console.error("加密過程發生錯誤:", error);
            saveBtn.textContent = '加密錯';
            setTimeout(() => saveBtn.textContent = '存', 1500);
        }
    }

    function loadFromIndexedDB() {
        if (!db) return;
        const transaction = db.transaction([storeName], "readonly");
        const store = transaction.objectStore(storeName);
        const request = store.get("savedText");

        request.onsuccess = function(event) {
            if (request.result) {
                try {
                    // 使用 CryptoJS 將讀取出的內容進行 AES 解密
                    const bytes = CryptoJS.AES.decrypt(request.result.content, SECRET_KEY);
                    const decryptedContent = bytes.toString(CryptoJS.enc.Utf8);

                    // 檢查解密結果是否有效（若密碼錯誤或未加密，轉碼後通常為空字串）
                    if (decryptedContent) {
                        inputBox.value = decryptedContent;
                        loadBtn.textContent = '已讀';
                    } else {
                        throw new Error("密碼不符或資料格式錯誤");
                    }
                } catch (error) {
                    console.error("解密失敗:", error);
                    loadBtn.textContent = '解密錯';
                }
            } else {
                loadBtn.textContent = '無檔';
            }
            setTimeout(() => loadBtn.textContent = '讀', 1500);
        };
        
        request.onerror = function(event) {
            console.error("讀取失敗:", event.target.error);
            loadBtn.textContent = '失敗';
            setTimeout(() => loadBtn.textContent = '讀', 1500);
        };
    }

    // 綁定手動存檔與讀取事件
    saveBtn.addEventListener('click', () => {
        saveToIndexedDB();
        inputBox.focus();
    });
    
    loadBtn.addEventListener('click', () => {
        loadFromIndexedDB();
        inputBox.focus();
    });

    initDB();
    inputBox.focus();
</script>

</body>
</html>
