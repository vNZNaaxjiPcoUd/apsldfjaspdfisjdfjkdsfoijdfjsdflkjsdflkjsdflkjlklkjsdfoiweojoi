<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>倉頡輸入</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Noto+Sans+TC:wght@400;700&display=swap');

        html, body {
            /* 【手機版優化】使用 dvh 動態視窗高度，避免被 Safari 底部工具列遮擋 */
            height: 100dvh;
            margin: 0;
            padding: 0;
            overflow: hidden; /* 防止整體頁面不必要的滑動 */
        }
        
        body {
            font-family: 'Nunito', 'Noto Sans TC', sans-serif;
            padding: 20px;
            box-sizing: border-box;
            background-color: #121212; /* 改為極暗色背景 */
            color: #e0e0e0; /* 調整文字為亮灰色 */
        }

        .container {
            background: #1e1e1e; /* 容器改為稍亮的深色 */
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); /* 陰影改為深色 */
            max-width: 1080px;
            height: 100%; 
            margin: auto;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            border: 1px solid #2e7d32; /* 增加一道暗綠色細邊框增加質感 */
        }
        
        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        h2 {
            margin: 0;
            color: #81c784; /* 改為淡綠色 */
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        h2::before {
            content: '🌱';
            font-size: 24px;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* 複製按鈕樣式 */
        #copy-btn {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 50px; 
            background-color: #43a047; /* 藍色系區隔 */
            color: #e1f5fe; 
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(2, 136, 209, 0.3);
            font-family: inherit;
        }
        
        #copy-btn:hover {
            background-color: #36813a;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(3, 155, 229, 0.4);
        }

        #mode-toggle {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 50px; 
            background-color: #2e7d32; /* 按鈕背景改為深綠 */
            color: #e8f5e9; /* 按鈕文字為淡綠 */
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(46, 125, 50, 0.3);
            font-family: inherit;
        }
        
        #mode-toggle:hover {
            background-color: #388e3c;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(56, 142, 60, 0.4);
        }

        .header-controls a {
            color: #81c784; /* 改為淡綠色 */
            text-decoration: none;
            font-weight: bold;
            font-size: 12px;
            transition: color 0.3s;
        }
        .header-controls a:hover {
            color: #a5d6a7;
        }

        #cj-status {
            margin-top: 0px;
            font-size: 18px;
            color: #b0bec5; /* 改為亮灰藍 */
            height: 25px; 
            font-weight: bold;
        }
        
        #current-code {
            font-weight: 900;
            color: #ffab91; /* 調淡橘色，在暗色背景更柔和 */
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        #candidates {
            margin-top: 15px;
            margin-bottom: 15px;
            font-size: 20px;
            height: 60px; 
            white-space: nowrap; 
            overflow-x: auto;    
            overflow-y: hidden;  
            -webkit-overflow-scrolling: touch; 
            scrollbar-width: thin;
            scrollbar-color: #2e7d32 transparent;
            padding-bottom: 10px;
            display: flex;
            align-items: center;
        }
        
        #candidates::-webkit-scrollbar {
            height: 6px;
        }
        #candidates::-webkit-scrollbar-track {
            background: transparent;
        }
        #candidates::-webkit-scrollbar-thumb {
            background-color: #2e7d32;
            border-radius: 10px;
        }

        .candidate {
            margin-right: 12px;
            cursor: pointer;
            padding: 10px 18px; 
            border: 2px solid transparent;
            border-radius: 16px;
            display: inline-block;
            background-color: #263238; /* 候選字背景改為暗藍灰 */
            color: #a5d6a7; /* 候選字文字改為淡綠色 */
            font-weight: bold;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
            -webkit-user-select: none;
        }

        @media (hover: hover) {
            .candidate:hover {
                background-color: #37474f;
                border-color: #4caf50; /* 懸停時邊框變綠 */
                transform: scale(1.08);
            }
        }
        .candidate:active {
            transform: scale(0.95);
            background-color: #4caf50;
            color: #121212;
        }
        
        label {
            margin-top: 5px;
            margin-bottom: 8px;
            font-weight: bold;
            color: #81c784;
            font-size: 14px;
        }
        
        textarea {
            width: 100%;
            flex-grow: 1; 
            resize: none;
            border: 2px solid #2e7d32; /* 輸入框邊框改為深綠 */
            border-radius: 20px;
            outline: none;
            padding: 15px;
            font-size: 16px; 
            font-family: inherit;
            line-height: 1.6;
            box-sizing: border-box;
            background-color: #151515; /* 輸入框內部極暗色 */
            color: #e0e0e0; /* 輸入文字為白色系 */
            transition: all 0.3s ease;
        }
        
        textarea:focus {
            border-color: #81c784; /* 聚焦時邊框變淡綠 */
            background-color: #1a1a1a;
            box-shadow: 0 0 0 4px rgba(129, 199, 132, 0.15);
        }

        /* --- 手機版 RWD 響應式排版調整 --- */
        @media (max-width: 600px) {
            body {
                padding: 1px; 
            }
            .container {
                padding: 1px; 
                border-radius: 3px;
            }
            .header-controls {
                gap: 2px;
                margin-bottom: 0px;
                font-size: 12px;
            }
            h2 {
                font-size: 20px;
            }
            #copy-btn, #mode-toggle {
                padding: 2px 16px;
                font-size: 12px;
            }
            #candidates {
                height: 18px; 
                margin-top: 1px;
                margin-bottom: 1px;
                font-size: 12px;
                padding-bottom: 0px;
                overflow-x: hidden;
            }
            .candidate {
                margin-right: 0px;
                padding: 0px 0px; 
                border: 1px solid transparent;
                border-radius: 2px;
            }          
            #cj-status {
                margin-top: 0px;
                font-size: 12px;
                color: #b0bec5;
                height: 13px; 
                font-weight: normal;
            }  
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-controls">
        <div id="cj-status">輸入：<span id="current-code"></span></div>
        <div class="header-right">
            <button id="copy-btn" title="複製內容">複製</button>
            <button id="mode-toggle" title="ctrl + L">倉頡</button>
            <a href="https://www.google.com/inputtools/try/" target="_blank">IME↗</a>
        </div>
    </div>
    <div id="candidates"></div>    
    <textarea id="input-box" 
              placeholder="點擊此處開始輸入..." 
              autocapitalize="none" 
              autocorrect="off" 
              autocomplete="off" 
              spellcheck="false"></textarea>
</div>

<script src="cangjie_dict.js"></script>
<script>
    const inputBox = document.getElementById('input-box');
    const candidatesDiv = document.getElementById('candidates');
    const currentCodeSpan = document.getElementById('current-code');
    const modeToggleBtn = document.getElementById('mode-toggle');
    const copyBtn = document.getElementById('copy-btn'); // 取得複製按鈕
    
    let currentCode = '';
    let isChineseMode = true;

    // --- 剪貼簿複製功能 ---
    copyBtn.addEventListener('click', async () => {
        try {
            await navigator.clipboard.writeText(inputBox.value);
            // 提供視覺回饋
            copyBtn.textContent = '已複製';
            copyBtn.style.backgroundColor = '#43a047'; // 變綠色表示成功
            
            setTimeout(() => {
                copyBtn.textContent = '複製';
                copyBtn.style.backgroundColor = '#43a047'; // 恢復原本顏色
            }, 1500);
        } catch (err) {
            console.error('複製失敗:', err);
            copyBtn.textContent = '失敗';
            setTimeout(() => {
                copyBtn.textContent = '複製';
            }, 1500);
        }
        inputBox.focus(); // 複製完保持游標在輸入框
    });

    function toggleMode() {
        isChineseMode = !isChineseMode;
        modeToggleBtn.textContent = isChineseMode ? '倉頡' : '英文';
        
        if(isChineseMode) {
            modeToggleBtn.style.backgroundColor = '#2e7d32';
            modeToggleBtn.style.color = '#e8f5e9';
        } else {
            modeToggleBtn.style.backgroundColor = '#424242';
            modeToggleBtn.style.color = '#bdbdbd';
        }
        
        currentCode = '';
        updateUI();
        inputBox.focus(); 
    }

    modeToggleBtn.addEventListener('click', toggleMode);

    function getCandidates(code) {
        if (typeof cangjieDict === 'undefined' || !code) return [];
        const resultSet = new Set();
        
        if (cangjieDict[code]) {
            cangjieDict[code].forEach(char => resultSet.add(char));
        }
        
        for (const key in cangjieDict) {
            if (key !== code && key.startsWith(code)) {
                cangjieDict[key].forEach(char => resultSet.add(char));
            }
        }
        return Array.from(resultSet);
    }

    inputBox.addEventListener('keydown', function(e) {
        if ((e.ctrlKey && e.key === ' ') || (e.ctrlKey && e.key.toLowerCase() === 'l')){
            e.preventDefault(); 
            toggleMode();
            return; 
        }

        if (!isChineseMode) return;

        if (e.key >= 'a' && e.key <= 'z' && !e.ctrlKey && !e.altKey && !e.metaKey) {
            e.preventDefault(); 
            currentCode += e.key;
            updateUI();
        } 
        else if (e.key === 'Backspace' && currentCode.length > 0) {
            e.preventDefault();
            currentCode = currentCode.slice(0, -1);
            updateUI();
        } 
        else if (e.key === ' ' && currentCode.length > 0) {
            e.preventDefault();
            const chars = getCandidates(currentCode);
            if (chars.length > 0) {
                commitChar(chars[0]);
            }
        }
        else if (e.key >= '1' && e.key <= '9' && currentCode.length > 0) {
            const index = parseInt(e.key) - 1;
            const chars = getCandidates(currentCode);
            if (chars && chars[index]) {
                e.preventDefault();
                commitChar(chars[index]);
            }
        }
    });

    function updateUI() {
        currentCodeSpan.textContent = currentCode;
        candidatesDiv.innerHTML = '';
        
        if (currentCode === '') return;

        if (typeof cangjieDict !== 'undefined') {
            const chars = getCandidates(currentCode);
            if (chars.length > 0) {
                chars.forEach((char, index) => {
                    const span = document.createElement('span');
                    span.className = 'candidate';
                    span.textContent = `${index + 1}. ${char}`;
                    
                    span.addEventListener('pointerdown', (e) => {
                        e.preventDefault(); 
                        commitChar(char);
                    });
                    
                    candidatesDiv.appendChild(span);
                });
            } else {
                candidatesDiv.innerHTML = '<span style="color: #757575; font-size: 16px; padding: 10px;">無符合字詞 💧</span>';
            }
        } else {
             candidatesDiv.innerHTML = '<span style="color: #ef5350; font-size: 16px; padding: 10px;">字典檔尚未載入 ⚠️</span>';
        }
    }

    function commitChar(char) {
        const start = inputBox.selectionStart;
        const end = inputBox.selectionEnd;
        const text = inputBox.value;
        
        inputBox.value = text.slice(0, start) + char + text.slice(end);
        inputBox.selectionStart = inputBox.selectionEnd = start + char.length;
        
        currentCode = ''; 
        updateUI();
        inputBox.focus();
    }
    inputBox.focus();
</script>

</body>
</html>
