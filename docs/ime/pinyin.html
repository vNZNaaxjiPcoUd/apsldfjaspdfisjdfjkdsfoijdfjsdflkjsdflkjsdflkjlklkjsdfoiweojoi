<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拼音輸入</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Noto+Sans+TC:wght@400;700&display=swap');

        html, body {
            height: 100dvh;
            margin: 0;
            padding: 0;
            overflow: hidden; 
        }
        
        body {
            font-family: 'Nunito', 'Noto Sans TC', sans-serif;
            padding: 20px;
            box-sizing: border-box;
            background-color: #121212; 
            color: #e0e0e0; 
        }

        .container {
            background: #1e1e1e; 
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); 
            max-width: 1080px;
            height: 100%; 
            margin: auto;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            border: 1px solid #1976d2; /* 改為藍色系 */
        }
        
        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        h2 {
            margin: 0;
            color: #64b5f6; 
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        #copy-btn {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 50px; 
            background-color: #1976d2; 
            color: #e1f5fe; 
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(25, 118, 210, 0.3);
            font-family: inherit;
        }
        
        #copy-btn:hover {
            background-color: #1565c0;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(21, 101, 192, 0.4);
        }

        #mode-toggle {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 50px; 
            background-color: #0d47a1; 
            color: #e3f2fd; 
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(13, 71, 161, 0.3);
            font-family: inherit;
        }
        
        #mode-toggle:hover {
            background-color: #002171;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 33, 113, 0.4);
        }

        .header-controls a {
            color: #64b5f6; 
            text-decoration: none;
            font-weight: bold;
            font-size: 12px;
            transition: color 0.3s;
        }
        .header-controls a:hover {
            color: #90caf9;
        }

        #py-status {
            margin-top: 0px;
            font-size: 18px;
            color: #b0bec5; 
            height: 25px; 
            font-weight: bold;
        }
        
        #current-code {
            font-weight: 900;
            color: #ffab91; 
            letter-spacing: 2px;
        }
        
        #candidates {
            margin-top: 15px;
            margin-bottom: 15px;
            font-size: 20px;
            height: 60px; 
            white-space: nowrap; 
            overflow-x: auto;    
            overflow-y: hidden;  
            -webkit-overflow-scrolling: touch; 
            scrollbar-width: thin;
            scrollbar-color: #1976d2 transparent;
            padding-bottom: 10px;
            display: flex;
            align-items: center;
        }

        .candidate {
            display: inline-block;
            margin-right: 15px;
            padding: 5px 10px;
            background-color: #333;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .candidate:hover {
            background-color: #555;
        }

        textarea {
            width: 100%;
            flex-grow: 1;
            background-color: #2a2a2a;
            color: #ffffff;
            border: 1px solid #424242;
            border-radius: 12px;
            padding: 15px;
            font-size: 18px;
            font-family: inherit;
            resize: none;
            outline: none;
            box-sizing: border-box;
        }
        textarea:focus {
            border-color: #64b5f6;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-controls">
        <div id="py-status">輸入：<span id="current-code"></span></div>
        <div class="header-right">
            <button id="copy-btn" title="複製內容">複製</button>
            <button id="mode-toggle" title="ctrl + L">拼音</button>
            <a href="https://translate.google.com/?sl=zh-TW&tl=en" target="_blank">輸入法↗</a>
        </div>
    </div>
    <div id="candidates"></div>    
    <textarea id="input-box" 
              placeholder="點擊此處開始輸入拼音 (例如: zhong)..." 
              autocapitalize="none" 
              autocorrect="off" 
              autocomplete="off" 
              spellcheck="false"></textarea>
</div>

<!--script src="https://cdn.jsdelivr.net/gh/sxei/pinyinjs@master/dict/pinyin_dict_notone.js"></script-->
<script src="pinyin_dict_notone.js"></script>
<script src="py.obf.js"></script>

</body>
</html>
