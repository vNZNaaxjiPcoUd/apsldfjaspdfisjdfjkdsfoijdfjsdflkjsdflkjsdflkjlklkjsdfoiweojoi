<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拼音輸入</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Noto+Sans+TC:wght@400;700&display=swap');

        html, body {
            height: 100dvh;
            margin: 0;
            padding: 0;
            overflow: hidden; 
        }
        
        body {
            font-family: 'Nunito', 'Noto Sans TC', sans-serif;
            padding: 20px;
            box-sizing: border-box;
            background-color: #121212; 
            color: #e0e0e0; 
        }

        .container {
            background: #1e1e1e; 
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); 
            max-width: 1080px;
            height: 100%; 
            margin: auto;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            border: 1px solid #1976d2; /* 改為藍色系 */
        }
        
        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        h2 {
            margin: 0;
            color: #64b5f6; 
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        #copy-btn {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 50px; 
            background-color: #1976d2; 
            color: #e1f5fe; 
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(25, 118, 210, 0.3);
            font-family: inherit;
        }
        
        #copy-btn:hover {
            background-color: #1565c0;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(21, 101, 192, 0.4);
        }

        #mode-toggle {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 50px; 
            background-color: #0d47a1; 
            color: #e3f2fd; 
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(13, 71, 161, 0.3);
            font-family: inherit;
        }
        
        #mode-toggle:hover {
            background-color: #002171;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 33, 113, 0.4);
        }

        .header-controls a {
            color: #64b5f6; 
            text-decoration: none;
            font-weight: bold;
            font-size: 12px;
            transition: color 0.3s;
        }
        .header-controls a:hover {
            color: #90caf9;
        }

        #py-status {
            margin-top: 0px;
            font-size: 18px;
            color: #b0bec5; 
            height: 25px; 
            font-weight: bold;
        }
        
        #current-code {
            font-weight: 900;
            color: #ffab91; 
            letter-spacing: 2px;
        }
        
        #candidates {
            margin-top: 15px;
            margin-bottom: 15px;
            font-size: 20px;
            height: 60px; 
            white-space: nowrap; 
            overflow-x: auto;    
            overflow-y: hidden;  
            -webkit-overflow-scrolling: touch; 
            scrollbar-width: thin;
            scrollbar-color: #1976d2 transparent;
            padding-bottom: 10px;
            display: flex;
            align-items: center;
        }

        .candidate {
            display: inline-block;
            margin-right: 15px;
            padding: 5px 10px;
            background-color: #333;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .candidate:hover {
            background-color: #555;
        }

        textarea {
            width: 100%;
            flex-grow: 1;
            background-color: #2a2a2a;
            color: #ffffff;
            border: 1px solid #424242;
            border-radius: 12px;
            padding: 15px;
            font-size: 18px;
            font-family: inherit;
            resize: none;
            outline: none;
            box-sizing: border-box;
        }
        textarea:focus {
            border-color: #64b5f6;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-controls">
        <div id="py-status">輸入：<span id="current-code"></span></div>
        <div class="header-right">
            <button id="copy-btn" title="複製內容">複製</button>
            <button id="mode-toggle" title="ctrl + L">拼音</button>
            <a href="https://translate.google.com/?sl=zh-TW&tl=en" target="_blank">輸入法↗</a>
        </div>
    </div>
    <div id="candidates"></div>    
    <textarea id="input-box" 
              placeholder="點擊此處開始輸入拼音 (例如: zhong)..." 
              autocapitalize="none" 
              autocorrect="off" 
              autocomplete="off" 
              spellcheck="false"></textarea>
</div>

<!--script src="https://cdn.jsdelivr.net/gh/sxei/pinyinjs@master/dict/pinyin_dict_notone.js"></script-->
<script src="pinyin_dict_notone.js"></script>
<script>
    const inputBox = document.getElementById('input-box');
    const candidatesDiv = document.getElementById('candidates');
    const currentCodeSpan = document.getElementById('current-code');
    const modeToggleBtn = document.getElementById('mode-toggle');
    const copyBtn = document.getElementById('copy-btn'); 
    
    let currentCode = '';
    let isChineseMode = true;

    // --- 標點符號對應表 ---
    const punctuationMap = {
        ',': '，', '.': '。', '?': '？', ';': '；', ' ': ' ', '!':'！', '(':'（', ')':'）',
    };

    copyBtn.addEventListener('click', async () => {
        try {
            await navigator.clipboard.writeText(inputBox.value);
            copyBtn.textContent = '已複製';
            copyBtn.style.backgroundColor = '#1976d2'; 
            
            setTimeout(() => {
                copyBtn.textContent = '複製';
            }, 1500);
        } catch (err) {
            console.error('複製失敗:', err);
            copyBtn.textContent = '失敗';
            setTimeout(() => {
                copyBtn.textContent = '複製';
            }, 1500);
        }
        inputBox.focus(); 
    });

    function toggleMode() {
        isChineseMode = !isChineseMode;
        modeToggleBtn.textContent = isChineseMode ? '拼音' : '英文';
        
        if(isChineseMode) {
            modeToggleBtn.style.backgroundColor = '#0d47a1';
            modeToggleBtn.style.color = '#e3f2fd';
        } else {
            modeToggleBtn.style.backgroundColor = '#424242';
            modeToggleBtn.style.color = '#bdbdbd';
        }
        
        currentCode = '';
        updateUI();
        inputBox.focus(); 
    }

    modeToggleBtn.addEventListener('click', toggleMode);

    // 解析 sxei 字典
    function getCandidates(code) {
        if (typeof pinyin_dict_notone === 'undefined' || !code) return [];
        const resultSet = new Set();
        
        // 1. 先匹配「完全符合」的拼音字 (例如輸入 'shi'，先把 'shi' 的字全拿出來)
        if (pinyin_dict_notone[code]) {
            for (let char of pinyin_dict_notone[code]) {
                resultSet.add(char);
            }
        }
        
        // 2. 接著匹配「前綴符合」的拼音字 (例如輸入 's'，會帶出 'sa', 'shi', 'shu' 的字)
        for (const key in pinyin_dict_notone) {
            if (key !== code && key.startsWith(code)) {
                for (let char of pinyin_dict_notone[key]) {
                    resultSet.add(char);
                }
            }
        }
        return Array.from(resultSet);
    }

    inputBox.addEventListener('keydown', function(e) {
        if ((e.ctrlKey && e.key === ' ') || (e.ctrlKey && e.key.toLowerCase() === 'l')){
            e.preventDefault(); 
            toggleMode();
            return; 
        }

        if (!isChineseMode) return;

        // 處理英文字母輸入
        if (e.key >= 'a' && e.key <= 'z' && !e.ctrlKey && !e.altKey && !e.metaKey) {
            e.preventDefault(); 
            currentCode += e.key;
            updateUI();
            return;
        } 
        
        // 處理退格鍵
        if (e.key === 'Backspace' && currentCode.length > 0) {
            e.preventDefault();
            currentCode = currentCode.slice(0, -1);
            updateUI();
            return;
        } 
        
        // 處理標點符號與空白鍵
        if (punctuationMap[e.key] && !e.ctrlKey && !e.altKey && !e.metaKey) {
            e.preventDefault();
            if (e.key === ' ') {
                if (currentCode.length > 0) {
                    const chars = getCandidates(currentCode);
                    if (chars.length > 0) commitChar(chars[0]);
                } else {
                    commitChar(punctuationMap[e.key]);
                }
            } else {
                if (currentCode.length > 0) {
                    const chars = getCandidates(currentCode);
                    if (chars.length > 0) {
                        commitChar(chars[0]);
                    } else {
                        currentCode = ''; 
                        updateUI();
                    }
                }
                commitChar(punctuationMap[e.key]);
            }
            return;
        }

        // 處理數字鍵選字 (1-9)
        if (e.key >= '1' && e.key <= '9' && currentCode.length > 0) {
            const index = parseInt(e.key) - 1;
            const chars = getCandidates(currentCode);
            if (chars && chars[index]) {
                e.preventDefault();
                commitChar(chars[index]);
            }
            return;
        }
    });

    function updateUI() {
        // 拼音直接顯示英文即可
        currentCodeSpan.textContent = currentCode;
        candidatesDiv.innerHTML = '';
        
        if (currentCode === '') return;

        if (typeof pinyin_dict_notone !== 'undefined') {
            const chars = getCandidates(currentCode);
            if (chars.length > 0) {
                // 為了避免畫面卡頓，最多只顯示前 50 個候選字
                const displayLimit = Math.min(chars.length, 50);
                for (let i = 0; i < displayLimit; i++) {
                    const char = chars[i];
                    const span = document.createElement('span');
                    span.className = 'candidate';
                    span.textContent = `${i < 9 ? i + 1 + '. ' : ''}${char}`;
                    
                    span.addEventListener('pointerdown', (e) => {
                        e.preventDefault(); 
                        commitChar(char);
                    });
                    
                    candidatesDiv.appendChild(span);
                }
            } else {
                candidatesDiv.innerHTML = '<span style="color: #757575; font-size: 16px; padding: 10px;">無符合字詞 💧</span>';
            }
        } else {
             candidatesDiv.innerHTML = '<span style="color: #ef5350; font-size: 16px; padding: 10px;">字典檔尚未載入 ⚠️</span>';
        }
    }

    function commitChar(char) {
        const start = inputBox.selectionStart;
        const end = inputBox.selectionEnd;
        const text = inputBox.value;
        
        inputBox.value = text.slice(0, start) + char + text.slice(end);
        inputBox.selectionStart = inputBox.selectionEnd = start + char.length;
        
        currentCode = ''; 
        updateUI();
        inputBox.focus();
    }
    
    inputBox.focus();
</script>

</body>
</html>
