<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>迷宮</title>
<link rel="manifest" href="mazemanifest.json">
<meta name="theme-color" content="#121212">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
    body {
        background-color: #121212; color: #e0e0e0; font-family: "Courier New", Courier, monospace;
        margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
        height: 100dvh; overscroll-behavior: none; padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
        box-sizing: border-box; -webkit-user-select: none; user-select: none; touch-action: none;
    }
    #header { text-align: center; margin-bottom: 5px; width: 100%; flex-shrink: 0; }
    h1 { margin: 8px 0 4px 0; font-size: 18px; color: #ffffff; }
    .stats-container { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; padding: 0 5px; }
    .stat-badge { background-color: #333; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; color: #4CAF50; border: 1px solid #4CAF50; }
    .gem-badge { color: #FFEB3B; border-color: #FFEB3B; }
    .total-gem-badge { color: #00BCD4; border-color: #00BCD4; }
    
    /* 縮小 Padding 讓迷宮能撐得更大 */
    #maze-wrapper { padding: 4px; background-color: #1a1a1a; border: 3px solid #4CAF50; border-radius: 8px; margin-bottom: 8px; flex-shrink: 0; }
    #maze-container { display: grid; gap: 0; background-color: #000; }
    .cell { display: flex; align-items: center; justify-content: center; font-weight: bold; line-height: 1; transition: background-color 0.1s; }

    .wall { background-color: #808080; color: transparent; } 
    .path { color: transparent; }
    .player { color: #FFFFFF; background-color: #FF5722; border-radius: 4px; box-shadow: 0 0 5px #FF5722; z-index: 2; }
    .goal { color: #FFEB3B; animation: blink 1s infinite; z-index: 2; }
    .gem { color: #00BCD4; font-size: 0.8em; }
    .indicator { color: #FF9800; text-shadow: 0 0 5px #FF9800; font-size: 1.2em; z-index: 3; animation: blink 0.8s infinite; }
    
    @keyframes blink { 50% { opacity: 0.4; } }
    
    /* 微調按鈕大小，節省垂直空間給迷宮 */
    #controls { display: grid; grid-template-columns: repeat(3, 70px); grid-template-rows: repeat(3, 55px); gap: 6px; flex-shrink: 0; margin-bottom: 5px; }
    .btn { background-color: #2a2a2a; color: #bbb; border: 2px solid #444; border-radius: 10px; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }
    .btn:active { background-color: #4CAF50; color: white; border-color: #4CAF50; }
    #btn-up { grid-column: 2; grid-row: 1; }
    #btn-left { grid-column: 1; grid-row: 2; }
    #btn-reset2 { grid-column: 2; grid-row: 2; font-size: 14px; background-color: #4a2c2c; color: #ffcccc; }
    #btn-right { grid-column: 3; grid-row: 2; }
    #btn-down { grid-column: 2; grid-row: 3; }

    @media (hover: hover) and (pointer: fine) { #controls { display: none; } }
</style>
</head>
<body>
<div id="header">
    <div class="stats-container">
        <div class="stat-badge">第 <span id="level-display">1</span> 關</div>
        <div class="stat-badge gem-badge">✨: <span id="gem-display">0</span></div>
        <div class="stat-badge total-gem-badge">累計 ✨: <span id="total-gem-display">0</span></div>
        <div class="stat-badge"><span id="btn-reset">重置</span></div>
    </div>
</div>
<div id="maze-wrapper"><div id="maze-container"></div></div>
<div id="controls">
    <button class="btn" id="btn-up">▲</button>
    <button class="btn" id="btn-left">◄</button>
    <button class="btn" id="btn-reset2">+</button>
    <button class="btn" id="btn-right">►</button>
    <button class="btn" id="btn-down">▼</button>
</div>

<script>
    const mazeContainer = document.getElementById('maze-container');
    const levelDisplay = document.getElementById('level-display');
    const gemDisplay = document.getElementById('gem-display');
    const totalGemDisplay = document.getElementById('total-gem-display');
    const controls = document.getElementById('controls');

    // --- 遊戲核心設定 ---
    let rows = 13, cols = 13; 
    let VIEW_RADIUS = 10; // 預設視野半徑 (會隨螢幕自動調整)
    let VIEW_SIZE = 21;   // 預設網格大小
    
    let maze = [], gridCells = [], gems = [], playerPos = { r: 1, c: 1 }, goalPos = { r: 1, c: 1 };
    let level = 1, totalGems = 0; 
    let resetClickCount = 0;
    let isMoving = false; 
    
    const DB_NAME = 'MazeGameDB', STORE_NAME = 'gameState'; let db;
    function initDB() { return new Promise((res) => { const req = indexedDB.open(DB_NAME, 1); req.onsuccess = e => { db = e.target.result; res(db); }; req.onupgradeneeded = e => { db = e.target.result; db.createObjectStore(STORE_NAME); }; }); }
    
    function saveProgress() { 
        if (!db) return;
        const tx = db.transaction([STORE_NAME], 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        store.put(level, 'savedLevel');
        store.put(totalGems, 'totalGems');
    }

    function loadProgress() {
        return new Promise(res => {
            if (!db) return res({ lv: 1, gems: 0 });
            const tx = db.transaction([STORE_NAME], 'readonly');
            const store = tx.objectStore(STORE_NAME);
            const reqLv = store.get('savedLevel');
            const reqGems = store.get('totalGems');
            reqLv.onsuccess = () => {
                reqGems.onsuccess = () => {
                    res({ lv: reqLv.result || 1, gems: reqGems.result || 0 });
                };
            };
        });
    }

    function resizeMaze() {
        const isControlsVisible = window.getComputedStyle(controls).display !== 'none';
        // 縮小預留高度，讓手機有更多垂直空間
        const reservedHeight = isControlsVisible ? 220 : 80; 
        // 縮減邊距為 12px，盡可能撐滿螢幕
        const availableSize = Math.min(window.innerWidth - 12, window.innerHeight - reservedHeight);
        
        mazeContainer.style.width = availableSize + 'px';
        mazeContainer.style.height = availableSize + 'px';
        mazeContainer.style.gridTemplateColumns = `repeat(${VIEW_SIZE}, 1fr)`;
        mazeContainer.style.gridTemplateRows = `repeat(${VIEW_SIZE}, 1fr)`;
        mazeContainer.style.fontSize = Math.floor((availableSize / VIEW_SIZE) * 0.7) + 'px';
    }

    window.addEventListener('resize', resizeMaze);

    function generateMaze() {
        rows = 11 + level * 2; 
        cols = 11 + level * 2;

        maze = Array.from({ length: rows }, () => Array(cols).fill(1));
        let branchProb = Math.min(0.75, (level - 1) * 0.04);
        let activeCells = [{ r: 1, c: 1 }], pathCells = []; maze[1][1] = 0;
        
        while (activeCells.length > 0) {
            let index = (Math.random() < branchProb) ? Math.floor(Math.random() * activeCells.length) : activeCells.length - 1;
            let cell = activeCells[index], neighbors = [];
            [[0, 2], [2, 0], [0, -2], [-2, 0]].forEach(([dr, dc]) => {
                let nr = cell.r + dr, nc = cell.c + dc;
                if (nr > 0 && nr < rows - 1 && nc > 0 && nc < cols - 1 && maze[nr][nc] === 1) neighbors.push({ r: nr, c: nc, dr, dc });
            });
            if (neighbors.length > 0) {
                let next = neighbors[Math.floor(Math.random() * neighbors.length)];
                maze[cell.r + next.dr / 2][cell.c + next.dc / 2] = 0; maze[next.r][next.c] = 0;
                activeCells.push({ r: next.r, c: next.c });
            } else { pathCells.push(activeCells.splice(index, 1)[0]); }
        }
        
        playerPos = { r: 1, c: 1 }; 
        goalPos = { r: rows - 2, c: cols - 2 }; 
        maze[goalPos.r][goalPos.c] = 0; 
        
        gems = []; 
        let gemCount = Math.floor((rows * cols) / 60);
        let candidates = pathCells.filter(p => !(p.r === 1 && p.c === 1) && !(p.r === goalPos.r && p.c === goalPos.c));
        for (let i = 0; i < gemCount && candidates.length > 0; i++) {
            gems.push(candidates.splice(Math.floor(Math.random() * candidates.length), 1)[0]);
        }
    }

    function initGrid() {
        mazeContainer.innerHTML = ''; gridCells = [];
        for (let r = 0; r < VIEW_SIZE; r++) {
            let rowCells = [];
            for (let c = 0; c < VIEW_SIZE; c++) {
                const cell = document.createElement('div'); 
                cell.className = 'cell';
                mazeContainer.appendChild(cell); 
                rowCells.push(cell);
            }
            gridCells.push(rowCells);
        }
    }

    function drawMaze() {
        let isGoalVisible = Math.abs(goalPos.r - playerPos.r) <= VIEW_RADIUS && Math.abs(goalPos.c - playerPos.c) <= VIEW_RADIUS;
        let indR = -1, indC = -1;
        let arrowChar = '';

        if (!isGoalVisible) {
            let dr = goalPos.r - playerPos.r;
            let dc = goalPos.c - playerPos.c;
            
            let clampedDr = Math.max(-VIEW_RADIUS, Math.min(VIEW_RADIUS, dr));
            let clampedDc = Math.max(-VIEW_RADIUS, Math.min(VIEW_RADIUS, dc));
            
            indR = clampedDr + VIEW_RADIUS;
            indC = clampedDc + VIEW_RADIUS;

            if (clampedDr === -VIEW_RADIUS && clampedDc === -VIEW_RADIUS) arrowChar = '⬉';
            else if (clampedDr === -VIEW_RADIUS && clampedDc === VIEW_RADIUS) arrowChar = '⬈';
            else if (clampedDr === VIEW_RADIUS && clampedDc === -VIEW_RADIUS) arrowChar = '⬋';
            else if (clampedDr === VIEW_RADIUS && clampedDc === VIEW_RADIUS) arrowChar = '⬊';
            else if (clampedDr === -VIEW_RADIUS) arrowChar = '⬆';
            else if (clampedDr === VIEW_RADIUS) arrowChar = '⬇';
            else if (clampedDc === -VIEW_RADIUS) arrowChar = '⬅';
            else if (clampedDc === VIEW_RADIUS) arrowChar = '➡';
        }

        for (let r = 0; r < VIEW_SIZE; r++) {
            for (let c = 0; c < VIEW_SIZE; c++) {
                let cell = gridCells[r][c];
                let mapR = playerPos.r - VIEW_RADIUS + r;
                let mapC = playerPos.c - VIEW_RADIUS + c;
                
                let isWall = mapR < 0 || mapR >= rows || mapC < 0 || mapC >= cols || maze[mapR][mapC] === 1;

                cell.className = 'cell';
                
                if (mapR === playerPos.r && mapC === playerPos.c) {
                    cell.classList.add('player');
                    cell.textContent = '＠';
                } else if (mapR === goalPos.r && mapC === goalPos.c) {
                    cell.classList.add('goal');
                    cell.textContent = '★';
                } else {
                    let gem = gems.find(g => g.r === mapR && g.c === mapC);
                    if (gem) {
                        cell.classList.add('gem');
                        cell.textContent = '✨';
                    } else {
                        cell.classList.add(isWall ? 'wall' : 'path');
                        cell.textContent = ' '; 
                    }
                }

                if (r === indR && c === indC) {
                    cell.className = 'cell indicator'; 
                    cell.textContent = arrowChar;
                }
            }
        }
        
        levelDisplay.textContent = level; 
        gemDisplay.textContent = gems.length;
        totalGemDisplay.textContent = totalGems;
    }

    function movePlayer(dr, dc) {
        if (isMoving) return; 
        resetClickCount = 0; 
        isMoving = true; 
        
        function nextStep(stepCount) {
            if (stepCount >= 10) {
                isMoving = false;
                return;
            }
            
            let nR = playerPos.r + dr, nC = playerPos.c + dc;
            if (!maze[nR] || maze[nR][nC] !== 0) {
                isMoving = false;
                return;
            }
            
            playerPos.r = nR; 
            playerPos.c = nC; 
            
            let gIdx = gems.findIndex(g => g.r === playerPos.r && g.c === playerPos.c);
            if (gIdx !== -1) {
                gems.splice(gIdx, 1);
                totalGems++; 
                saveProgress(); 
            }

            drawMaze(); 
            
            if (playerPos.r === goalPos.r && playerPos.c === goalPos.c) {
                isMoving = false;
                setTimeout(() => { level++; saveProgress(); startNewLevel(); }, 150);
                return;
            }
            
            let isIntersection = false;
            if (dr !== 0) { 
                if (maze[playerPos.r][playerPos.c - 1] === 0 || maze[playerPos.r][playerPos.c + 1] === 0) isIntersection = true;
            } else { 
                if (maze[playerPos.r - 1][playerPos.c] === 0 || maze[playerPos.r + 1][playerPos.c] === 0) isIntersection = true;
            }
            
            if (isIntersection) {
                isMoving = false;
                return;
            }
            
            setTimeout(() => nextStep(stepCount + 1), 30); 
        }
        
        nextStep(0);
    }

    window.addEventListener('keydown', e => { 
        if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.code)) e.preventDefault(); 
        switch(e.code){ 
            case 'ArrowUp': case 'KeyW': movePlayer(-1,0); break; 
            case 'ArrowDown': case 'KeyS': movePlayer(1,0); break; 
            case 'ArrowLeft': case 'KeyA': movePlayer(0,-1); break; 
            case 'ArrowRight': case 'KeyD': movePlayer(0,1); break; 
            case 'KeyR': resetLevel(); break; 
        } 
    });
    
    function bindBtn(id, dr, dc) { document.getElementById(id).addEventListener('pointerdown', e => { e.preventDefault(); movePlayer(dr, dc); }); }
    bindBtn('btn-up', -1, 0); bindBtn('btn-down', 1, 0); bindBtn('btn-left', 0, -1); bindBtn('btn-right', 0, 1);
    
    document.getElementById('btn-reset').addEventListener('pointerdown', e => { 
        e.preventDefault(); 
        resetClickCount++; 

        if (resetClickCount >= 5) {
            if (confirm("確定要清除所有進度，從第 1 關重新開始嗎？")) {
                const tx = db.transaction([STORE_NAME], 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                store.clear(); 
                level = 1; totalGems = 0; resetClickCount = 0;
                startNewLevel();
            } else {
                resetClickCount = 0; resetLevel();
            }
        } else {
            resetLevel();
        }
    });
    
    function resetLevel() { playerPos = { r: 1, c: 1 }; drawMaze(); }
    
    function startNewLevel() { 
        // 核心修改：判斷螢幕寬度，手機版視野改為看 6 步 (13x13 網格)，電腦版看 10 步 (21x21 網格)
        VIEW_RADIUS = window.innerWidth < 500 ? 6 : 10;
        VIEW_SIZE = VIEW_RADIUS * 2 + 1;

        resizeMaze(); 
        generateMaze(); 
        initGrid();     
        drawMaze();     
    }
    
    initDB().then(loadProgress).then(data => { 
        level = data.lv; 
        totalGems = data.gems; 
        startNewLevel(); 
    });
</script>
</body>
</html>
